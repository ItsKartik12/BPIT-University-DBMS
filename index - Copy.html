<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>BPIT University Management</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap");

      :root {
        --bg: #0b0f1a;
        --sidebar: #111827;
        --card: rgba(31, 41, 55, 0.7);
        --accent: #60a5fa;
        --text-primary: #f8fafc;
        --text-secondary: #94a3b8;
      }

      body {
        font-family: "Plus Jakarta Sans", sans-serif;
        background-color: var(--bg);
        color: var(--text-primary);
        margin: 0;
        display: flex;
        font-size: 16px; /* Normal content size */
      }

      /* Sidebar - Emphasized at 18px */
      .sidebar {
        width: 260px;
        background: var(--sidebar);
        height: 100vh;
        position: fixed;
        padding: 40px 20px;
        border-right: 1px solid rgba(255, 255, 255, 0.05);
      }

      .nav-btn {
        display: block;
        width: 100%;
        padding: 15px;
        margin-bottom: 10px;
        background: transparent;
        border: none;
        color: var(--text-secondary);
        font-size: 18px; /* Slightly larger sidebar font */
        font-weight: 600;
        text-align: left;
        cursor: pointer;
        border-radius: 12px;
        transition: 0.3s;
      }

      .nav-btn:hover,
      .nav-btn.active {
        background: rgba(96, 165, 250, 0.1);
        color: var(--accent);
      }

      /* Main Glass-morphism Cards */
      .main {
        margin-left: 300px;
        padding: 50px;
        width: 100%;
      }

      .card {
        background: var(--card);
        backdrop-filter: blur(10px);
        padding: 30px;
        border-radius: 24px;
        border: 1px solid rgba(255, 255, 255, 0.05);
        margin-bottom: 30px;
      }

      .form-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 15px;
      }

      input {
        background: rgba(0, 0, 0, 0.2);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: white;
        padding: 12px;
        border-radius: 8px;
        font-size: 16px;
      }

      .btn-add {
        background: var(--accent);
        color: #000;
        font-weight: 800;
        border: none;
        padding: 12px;
        border-radius: 8px;
        cursor: pointer;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
      }
      th {
        text-align: left;
        color: var(--text-secondary);
        padding: 15px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        font-size: 0.8rem;
        text-transform: uppercase;
      }
      td {
        padding: 15px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      }

      .btn-del {
        color: #f43f5e;
        background: none;
        border: none;
        cursor: pointer;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <nav class="sidebar">
      <h2 style="margin-bottom: 40px; color: var(--accent)">BPIT Admin</h2>
      <button class="nav-btn active" onclick="switchTab('STUDENTS', 'RollNo')">
        Students
      </button>
      <button class="nav-btn" onclick="switchTab('FACULTY', 'FacultyID')">
        Faculty
      </button>
      <button class="nav-btn" onclick="switchTab('COURSES', 'CourseNo')">
        Courses
      </button>
      <button class="nav-btn" onclick="switchTab('DEPARTMENTS', 'DeptID')">
        Departments
      </button>
      <button class="nav-btn" onclick="switchTab('COLLEGES', 'CollegeID')">
        Colleges
      </button>
    </nav>

    <main class="main">
      <div class="card">
        <h2 id="viewTitle">Students Management</h2>
        <form id="dataForm" class="form-grid"></form>
      </div>

      <div class="card">
        <table>
          <thead id="thead"></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </main>

    <script>
      let activeTab = "STUDENTS",
        activePK = "RollNo";
      const schema = {
        STUDENTS: ["RollNo", "Name", "Year", "Address", "Contact_No"],
        FACULTY: [
          "FacultyID",
          "Name",
          "Designation",
          "Qualification",
          "DeptID",
        ],
        COURSES: ["CourseNo", "Course_Title", "Year", "DeptID"],
        DEPARTMENTS: ["DeptID", "Dept_Name", "HOD_Name", "CollegeID"],
        COLLEGES: ["CollegeID", "Name", "Address", "Contact_No"],
      };

      function renderUI() {
        document.getElementById("dataForm").innerHTML =
          schema[activeTab]
            .map((f) => `<input id="${f}" placeholder="${f}" required>`)
            .join("") +
          `<button type="submit" class="btn-add">Add Entry</button>`;
        loadData();
      }

      async function loadData() {
        const res = await fetch(`http://localhost:3000/api/${activeTab}`);
        const data = await res.json();
        const th = document.getElementById("thead"),
          tb = document.getElementById("tbody");
        if (data.length > 0) {
          const cols = Object.keys(data[0]);
          th.innerHTML = `<tr>${cols.map((c) => `<th>${c}</th>`).join("")}<th>Action</th></tr>`;
          tb.innerHTML = data
            .map(
              (row) =>
                `<tr>${cols.map((c) => `<td>${row[c]}</td>`).join("")}<td><button class="btn-del" onclick="del('${row[activePK]}')">Delete</button></td></tr>`,
            )
            .join("");
        }
      }

      document.getElementById("dataForm").onsubmit = async (e) => {
        e.preventDefault();
        const body = {};
        schema[activeTab].forEach(
          (f) => (body[f] = document.getElementById(f).value),
        );
        await fetch(`http://localhost:3000/api/${activeTab}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });
        e.target.reset();
        loadData();
      };

      async function del(id) {
        if (confirm("Delete record?")) {
          await fetch(
            `http://localhost:3000/api/${activeTab}/${activePK}/${id}`,
            { method: "DELETE" },
          );
          loadData();
        }
      }

      function switchTab(tab, pk) {
        activeTab = tab;
        activePK = pk;
        document
          .querySelectorAll(".nav-btn")
          .forEach((b) => b.classList.remove("active"));
        event.target.classList.add("active");
        document.getElementById("viewTitle").innerText = tab + " Management";
        renderUI();
      }
      window.onload = renderUI;
    </script>
  </body>
</html>
