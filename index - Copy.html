<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>BPIT University DBMS</title>
    <style>
      :root {
        --bg: #1a1a1a;
        --card: #242424;
        --text: #e0e0e0;
        --accent: #4a90e2;
      }
      body {
        font-family: "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
        margin: 0;
        display: flex;
      }

      /* Sidebar Styles */
      nav {
        width: 250px;
        background: var(--card);
        height: 100vh;
        padding: 20px;
        border-right: 1px solid #333;
      }
      .logo {
        width: 100px;
        display: block;
        margin: 0 auto 20px;
      }
      nav h2 {
        font-size: 1.2rem;
        color: var(--accent);
        text-align: center;
        margin-bottom: 30px;
      }
      .nav-btn {
        width: 100%;
        padding: 12px;
        margin: 5px 0;
        background: none;
        border: 1px solid #444;
        color: white;
        cursor: pointer;
        text-align: left;
        border-radius: 4px;
        transition: 0.3s;
      }
      .nav-btn:hover,
      .nav-btn.active {
        background: var(--accent);
        border-color: var(--accent);
      }

      /* Main Content */
      main {
        flex: 1;
        padding: 40px;
        overflow-y: auto;
      }
      .form-container {
        background: var(--card);
        padding: 20px;
        border-radius: 8px;
        margin-bottom: 30px;
      }
      input {
        background: #333;
        border: 1px solid #444;
        color: white;
        padding: 10px;
        margin: 5px;
        border-radius: 4px;
      }
      button.add-btn {
        background: #28a745;
        color: white;
        border: none;
        padding: 10px 20px;
        cursor: pointer;
        border-radius: 4px;
      }

      /* Table Styles */
      table {
        width: 100%;
        border-collapse: collapse;
        background: var(--card);
        border-radius: 8px;
        overflow: hidden;
      }
      th,
      td {
        padding: 15px;
        text-align: left;
        border-bottom: 1px solid #333;
      }
      th {
        background: #2d2d2d;
        color: var(--accent);
        text-transform: uppercase;
        font-size: 0.85rem;
      }
      .btn-del {
        background: #dc3545;
        color: white;
        border: none;
        padding: 5px 10px;
        cursor: pointer;
        border-radius: 3px;
      }
    </style>
  </head>
  <body>
    <nav>
      <img src="bpit-logo.png" alt="BPIT Logo" class="logo" />
      <h2>University DBMS</h2>
      <button
        class="nav-btn active"
        onclick="switchTable('students', 'RollNo')"
      >
        Students
      </button>
      <button class="nav-btn" onclick="switchTable('faculty', 'FacultyID')">
        Faculty
      </button>
      <button class="nav-btn" onclick="switchTable('departments', 'DeptID')">
        Departments
      </button>
      <button class="nav-btn" onclick="switchTable('colleges', 'CollegeID')">
        Colleges
      </button>
      <button class="nav-btn" onclick="switchTable('courses', 'CourseNo')">
        Courses
      </button>
      <button
        class="nav-btn"
        onclick="switchTable('progress_report', 'ReportID')"
      >
        Reports
      </button>
    </nav>

    <main>
      <h1 id="table-title">Management System: Students</h1>

      <div class="form-container" id="form-area">
        <div id="dynamic-inputs">
          <input id="in1" placeholder="Roll Number" />
          <input id="in2" placeholder="Full Name" />
          <input id="in3" placeholder="Year" />
          <input id="in4" placeholder="Address" />
          <input id="in5" placeholder="Contact No" />
        </div>
        <button class="add-btn" onclick="addRecord()">Add Record</button>
      </div>

      <table>
        <thead id="thead"></thead>
        <tbody id="tbody"></tbody>
      </table>
    </main>

    <script>
      let currentTable = "students";
      let currentPK = "RollNo";

      async function switchTable(table, pk) {
        currentTable = table;
        currentPK = pk;
        document.getElementById("table-title").innerText =
          `Management System: ${table.charAt(0).toUpperCase() + table.slice(1)}`;

        // Update active button UI
        document
          .querySelectorAll(".nav-btn")
          .forEach((btn) => btn.classList.remove("active"));
        event.target.classList.add("active");

        fetchData();
      }

      async function fetchData() {
        try {
          const res = await fetch(`http://localhost:3000/api/${currentTable}`);
          const data = await res.json();
          renderTable(data);
        } catch (err) {
          console.error("Connection failed. Ensure server.js is running.");
        }
      }

      function renderTable(data) {
        const thead = document.getElementById("thead");
        const tbody = document.getElementById("tbody");

        if (data.length > 0) {
          const cols = Object.keys(data[0]);
          thead.innerHTML = `<tr>${cols.map((c) => `<th>${c}</th>`).join("")}<th>Actions</th></tr>`;
          tbody.innerHTML = data
            .map(
              (row) => `
                <tr>
                    ${cols.map((c) => `<td>${row[c]}</td>`).join("")}
                    <td><button class="btn-del" onclick="deleteItem('${row[currentPK]}')">Delete</button></td>
                </tr>
            `,
            )
            .join("");
        } else {
          tbody.innerHTML = '<tr><td colspan="10">No records found.</td></tr>';
        }
      }

      async function deleteItem(id) {
        if (confirm("Are you sure you want to delete this record?")) {
          await fetch(
            `http://localhost:3000/api/${currentTable}/${currentPK}/${id}`,
            { method: "DELETE" },
          );
          fetchData();
        }
      }

      // Initial load
      fetchData();
    </script>
  </body>
</html>
