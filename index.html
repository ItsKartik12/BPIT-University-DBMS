<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BPIT University Management | Elite</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');

        :root {
            --bg-deep: #050a14;
            --sidebar-bg: #0a1120;
            --card-bg: #0d1629;
            --accent-cyan: #00f2ff;
            --accent-purple: #7000ff;
            --gradient-main: linear-gradient(135deg, #00f2ff, #7000ff);
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --border-color: #1e293b;
            --glow: 0 0 15px rgba(0, 242, 255, 0.4);
        }

        body.light-theme {
            --bg-deep: #f0f2f5;
            --sidebar-bg: #ffffff;
            --card-bg: #ffffff;
            --accent-cyan: #0062ff;
            --accent-purple: #7000ff;
            --gradient-main: linear-gradient(135deg, #0062ff, #7000ff);
            --text-main: #1e293b;
            --text-dim: #64748b;
            --border-color: #cbd5e1;
            --glow: 0 4px 12px rgba(0, 0, 0, 0.1);
        }

        * { box-sizing: border-box; transition: all 0.3s ease; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-main);
            margin: 0;
            display: flex;
            min-height: 100vh;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 260px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            z-index: 100;
        }

        .logo { 
            font-size: 26px; 
            font-weight: 800; 
            margin-bottom: 50px; 
            color: var(--accent-cyan);
            text-shadow: var(--glow);
        }
        .logo span { color: var(--accent-purple); }

        .theme-btn {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border-color);
            color: var(--text-dim);
            padding: 10px;
            border-radius: 12px;
            margin-bottom: 30px;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
        }
        .theme-btn:hover { border-color: var(--accent-cyan); color: white; }

        .nav-item {
            padding: 15px 20px;
            border-radius: 12px;
            color: var(--text-dim);
            font-weight: 600;
            margin-bottom: 10px;
            cursor: pointer;
            border: none;
            background: transparent;
            text-align: left;
            width: 100%;
            position: relative;
        }

        .nav-item.active {
            background: var(--gradient-main);
            color: white;
            box-shadow: 0 10px 20px rgba(0, 242, 255, 0.2);
            transform: translateX(5px);
        }

        /* --- MAIN CONTENT --- */
        .main-content {
            flex: 1;
            margin-left: 260px;
            padding: 50px;
        }

        .section-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 35px;
            margin-bottom: 30px;
            box-shadow: var(--glow);
        }

        h1 { 
            font-size: 36px; 
            font-weight: 800; 
            margin: 0 0 15px 0; 
            letter-spacing: -1px;
            background: var(--gradient-main);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .header-underline {
            width: 80px;
            height: 6px;
            background: var(--accent-cyan);
            box-shadow: var(--glow);
            border-radius: 10px;
            margin-bottom: 30px;
        }

        .search-input {
            width: 100%;
            max-width: 450px;
            background: var(--bg-deep);
            border: 1px solid var(--border-color);
            color: white;
            padding: 15px 20px;
            border-radius: 12px;
            outline: none;
            margin-bottom: 25px;
        }
        .search-input:focus { border-color: var(--accent-cyan); box-shadow: var(--glow); }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        input {
            background: var(--bg-deep);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 15px;
            border-radius: 12px;
            outline: none;
        }
        input:focus { border-color: var(--accent-purple); }

        .add-btn {
            background: var(--gradient-main);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .add-btn:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(112, 0, 255, 0.4); }

        /* --- TABLE --- */
        .stats { 
            color: var(--accent-cyan); 
            font-weight: 700; 
            margin-bottom: 20px; 
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 1px;
        }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; color: var(--text-dim); font-size: 11px; text-transform: uppercase; padding: 20px; border-bottom: 2px solid var(--border-color); }
        td { padding: 20px; border-bottom: 1px solid var(--border-color); font-size: 14px; font-weight: 500; }

        .delete-btn {
            background: rgba(255, 0, 85, 0.05); 
            border: 1px solid #ff0055; 
            color: #ff0055;
            padding: 8px 16px; 
            border-radius: 8px; 
            font-size: 11px; 
            font-weight: 800; 
            cursor: pointer;
        }
        .delete-btn:hover { background: #ff0055; color: white; box-shadow: 0 0 15px rgba(255, 0, 85, 0.3); }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo">BPIT <span>DB</span></div>
        <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">SWITCH THEME</button>
        
        <button class="nav-item active" onclick="switchTab('STUDENTS', 'RollNo', event)">Students</button>
        <button class="nav-item" onclick="switchTab('FACULTY', 'FacultyID', event)">Faculty</button>
        <button class="nav-item" onclick="switchTab('COURSES', 'CourseNo', event)">Courses</button>
        <button class="nav-item" onclick="switchTab('DEPARTMENTS', 'DeptID', event)">Departments</button>
        <button class="nav-item" onclick="switchTab('COLLEGES', 'CollegeID', event)">Colleges</button>
    </aside>

    <main class="main-content">
        <section class="section-card">
            <h1 id="viewTitle">STUDENTS</h1>
            <div class="header-underline"></div>
            
            <input type="text" id="search" class="search-input" placeholder="Quick Search (ID, Name, Year...)" onkeyup="filter()">
            <form id="dataForm" class="form-grid"></form>
        </section>

        <section class="section-card">
            <div class="stats">Database Sync: <span id="count" style="color:white">0</span> Records found</div>
            <div style="overflow-x: auto;">
                <table>
                    <thead id="thead"></thead>
                    <tbody id="tbody"></tbody>
                </table>
            </div>
        </section>
    </main>

    <script>
        let allData = [];
        let activeTab = "STUDENTS";
        let activePK = "RollNo";
        const API = "https://bpit-university-dbms.onrender.com/api";

        function toggleTheme() {
            document.body.classList.toggle('light-theme');
            document.getElementById('themeBtn').innerText = document.body.classList.contains('light-theme') ? "DARK MODE" : "LIGHT MODE";
        }

        const schema = {
            STUDENTS: ["RollNo", "Name", "Year", "Address", "Contact_No"],
            FACULTY: ["FacultyID", "Name", "Designation", "Qualification", "DeptID"],
            COURSES: ["CourseNo", "Course_Title", "Year", "DeptID"],
            DEPARTMENTS: ["DeptID", "Dept_Name", "HOD_Name", "CollegeID"],
            COLLEGES: ["CollegeID", "Name", "Address", "Contact_No"]
        };

        async function load() {
            const tb = document.getElementById("tbody");
            tb.innerHTML = "<tr><td colspan='10' style='text-align:center; opacity:0.5'>FETCHING FROM RENDER...</td></tr>";
            try {
                const res = await fetch(`${API}/${activeTab}`);
                allData = await res.json();
                render(allData);
            } catch (e) { tb.innerHTML = "<tr><td>Error linking to Database.</td></tr>"; }
        }

        function render(data) {
            const tb = document.getElementById("tbody");
            const th = document.getElementById("thead");
            document.getElementById("count").innerText = data.length;
            if (data.length > 0) {
                const cols = Object.keys(data[0]);
                th.innerHTML = `<tr>${cols.map(c => `<th>${c}</th>`).join("")}<th></th></tr>`;
                tb.innerHTML = data.map(row => `<tr>${cols.map(c => `<td>${row[c]||"—"}</td>`).join("")}<td><button class="delete-btn" onclick="del('${row[activePK]}')">DELETE</button></td></tr>`).join("");
            } else { tb.innerHTML = "<tr><td colspan='10' style='text-align:center'>Empty Dataset</td></tr>"; }
        }

        function filter() {
            const q = document.getElementById("search").value.toLowerCase();
            render(allData.filter(item => Object.values(item).some(v => String(v).toLowerCase().includes(q))));
        }

        function renderUI() {
            document.getElementById("dataForm").innerHTML = schema[activeTab].map(f => `<input id="${f}" placeholder="${f}" required>`).join("") + `<button type="submit" class="add-btn">Add Record</button>`;
            document.getElementById("search").value = "";
            load();
        }

        document.getElementById("dataForm").onsubmit = async (e) => {
            e.preventDefault();
            const body = {}; schema[activeTab].forEach(f => body[f] = document.getElementById(f).value);
            await fetch(`${API}/${activeTab}`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) });
            e.target.reset(); load();
        };

        async function del(id) {
            if(confirm("Confirm deletion of record " + id + "?")) { 
                await fetch(`${API}/${activeTab}/${activePK}/${id}`, { method: "DELETE" }); 
                load(); 
            }
        }

        function switchTab(t, pk, e) {
            activeTab = t; activePK = pk;
            document.querySelectorAll(".nav-item").forEach(b => b.classList.remove("active"));
            e.currentTarget.classList.add("active");
            document.getElementById("viewTitle").innerText = t;
            renderUI();
        }
        window.onload = renderUI;
    </script>
</body>
</html>
