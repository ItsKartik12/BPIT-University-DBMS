<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BPIT University Management | Admin Dashboard</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap");

      :root {
        --bg: #0b0f1a;
        --sidebar: #111827;
        --card: rgba(31, 41, 55, 0.7);
        --accent: #60a5fa;
        --text-primary: #f8fafc;
        --text-secondary: #94a3b8;
        --border: rgba(255, 255, 255, 0.05);
        --input-bg: rgba(0, 0, 0, 0.2);
      }

      [data-theme="light"] {
        --bg: #f1f5f9;
        --sidebar: #ffffff;
        --card: #ffffff;
        --accent: #2563eb;
        --text-primary: #1e293b;
        --text-secondary: #64748b;
        --border: rgba(0, 0, 0, 0.1);
        --input-bg: #f8fafc;
      }

      body {
        font-family: "Plus Jakarta Sans", sans-serif;
        background-color: var(--bg);
        color: var(--text-primary);
        margin: 0;
        display: flex;
        flex-direction: row;
        min-height: 100vh;
        transition: background-color 0.3s ease;
      }

      /* Responsive Sidebar Logic */
      .sidebar {
        width: 260px;
        background: var(--sidebar);
        height: 100vh;
        position: fixed;
        padding: 40px 20px;
        border-right: 1px solid var(--border);
        transition: 0.3s;
        z-index: 1000;
        overflow-y: auto;
      }

      .main {
        margin-left: 300px; /* Space for desktop sidebar */
        padding: 40px;
        width: calc(100% - 300px);
        transition: 0.3s;
      }

      /* --- MEDIA QUERIES FOR MOBILE --- */
      @media (max-width: 992px) {
        body {
          flex-direction: column;
        }
        .sidebar {
          width: 100%;
          height: auto;
          position: relative;
          padding: 20px;
          border-right: none;
          border-bottom: 1px solid var(--border);
        }
        .main {
          margin-left: 0;
          padding: 20px;
          width: 100%;
          box-sizing: border-box;
        }
        .nav-btn-container {
          display: flex;
          overflow-x: auto;
          gap: 10px;
          padding-bottom: 10px;
        }
        .nav-btn {
          white-space: nowrap;
          min-width: max-content;
          margin-bottom: 0 !important;
        }
      }

      /* Sidebar Elements */
      .nav-btn {
        display: block;
        width: 100%;
        padding: 12px 15px;
        margin-bottom: 8px;
        background: transparent;
        border: none;
        color: var(--text-secondary);
        font-size: 16px;
        font-weight: 600;
        text-align: left;
        cursor: pointer;
        border-radius: 12px;
        transition: 0.3s;
      }

      .nav-btn:hover, .nav-btn.active {
        background: rgba(96, 165, 250, 0.1);
        color: var(--accent);
      }

      #theme-toggle {
        border: 1px solid var(--accent);
        margin-bottom: 25px;
        text-align: center;
      }

      /* Main Content UI */
      .card {
        background: var(--card);
        backdrop-filter: blur(10px);
        padding: 25px;
        border-radius: 20px;
        border: 1px solid var(--border);
        margin-bottom: 25px;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      }

      .form-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 12px;
      }

      input {
        background: var(--input-bg);
        border: 1px solid var(--border);
        color: var(--text-primary);
        padding: 12px;
        border-radius: 8px;
        font-size: 14px;
        width: 100%;
        box-sizing: border-box;
      }

      .btn-add {
        background: var(--accent);
        color: #fff;
        font-weight: 800;
        border: none;
        padding: 12px;
        border-radius: 8px;
        cursor: pointer;
      }

      /* Table Styles */
      .table-container {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
      }

      table {
        width: 100%;
        min-width: 600px; /* Ensures table doesn't squish too much */
        border-collapse: collapse;
      }

      th, td {
        text-align: left;
        padding: 12px;
        border-bottom: 1px solid var(--border);
        font-size: 0.9rem;
      }

      .btn-del {
        color: #f43f5e;
        background: rgba(244, 63, 94, 0.1);
        border: none;
        padding: 5px 10px;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <nav class="sidebar">
      <h2 style="margin-bottom: 15px; color: var(--accent)">BPIT Admin</h2>
      
      <button id="theme-toggle" class="nav-btn">🌙 Dark Mode</button>

      <div class="nav-btn-container">
        <button class="nav-btn active" onclick="switchTab('STUDENTS', 'RollNo', event)">Students</button>
        <button class="nav-btn" onclick="switchTab('FACULTY', 'FacultyID', event)">Faculty</button>
        <button class="nav-btn" onclick="switchTab('COURSES', 'CourseNo', event)">Courses</button>
        <button class="nav-btn" onclick="switchTab('DEPARTMENTS', 'DeptID', event)">Departments</button>
        <button class="nav-btn" onclick="switchTab('COLLEGES', 'CollegeID', event)">Colleges</button>
      </div>
    </nav>

    <main class="main">
      <div class="card">
        <h2 id="viewTitle" style="margin-top:0">STUDENTS Management</h2>
        <form id="dataForm" class="form-grid"></form>
      </div>

      <div class="card">
        <div class="table-container">
          <table>
            <thead id="thead"></thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
      </div>
    </main>

    <script>
      let activeTab = "STUDENTS";
      let activePK = "RollNo";
      const BASE_URL = "https://bpit-university-dbms.onrender.com/api";

      const themeToggle = document.getElementById('theme-toggle');
      themeToggle.addEventListener('click', () => {
        const isLight = document.documentElement.getAttribute('data-theme') === 'light';
        document.documentElement.setAttribute('data-theme', isLight ? 'dark' : 'light');
        themeToggle.innerText = isLight ? '🌙 Dark Mode' : '☀️ Light Mode';
      });

      const schema = {
        STUDENTS: ["RollNo", "Name", "Year", "Address", "Contact_No"],
        FACULTY: ["FacultyID", "Name", "Designation", "Qualification", "DeptID"],
        COURSES: ["CourseNo", "Course_Title", "Year", "DeptID"],
        DEPARTMENTS: ["DeptID", "Dept_Name", "HOD_Name", "CollegeID"],
        COLLEGES: ["CollegeID", "Name", "Address", "Contact_No"],
      };

      function renderUI() {
        const form = document.getElementById("dataForm");
        form.innerHTML = schema[activeTab]
          .map((f) => `<input id="${f}" placeholder="${f}" required>`)
          .join("") +
          `<button type="submit" class="btn-add">Add Entry</button>`;
        loadData();
      }

      async function loadData() {
        const tb = document.getElementById("tbody");
        const th = document.getElementById("thead");
        tb.innerHTML = "<tr><td colspan='100%'>Loading...</td></tr>";

        try {
          const res = await fetch(`${BASE_URL}/${activeTab}`);
          const data = await res.json();

          if (data && data.length > 0) {
            const cols = Object.keys(data[0]);
            th.innerHTML = `<tr>${cols.map((c) => `<th>${c}</th>`).join("")}<th>Action</th></tr>`;
            tb.innerHTML = data.map((row) => `
              <tr>
                ${cols.map((c) => `<td>${row[c] || ""}</td>`).join("")}
                <td><button class="btn-del" onclick="del('${row[activePK]}')">Delete</button></td>
              </tr>
            `).join("");
          } else {
            tb.innerHTML = "<tr><td colspan='100%'>No records found.</td></tr>";
          }
        } catch (err) {
          tb.innerHTML = "<tr><td colspan='100%'>Error connecting to server.</td></tr>";
        }
      }

      document.getElementById("dataForm").onsubmit = async (e) => {
        e.preventDefault();
        const body = {};
        schema[activeTab].forEach(f => body[f] = document.getElementById(f).value);

        await fetch(`${BASE_URL}/${activeTab}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });
        e.target.reset();
        loadData();
      };

      async function del(id) {
        if (confirm(`Delete ID: ${id}?`)) {
          await fetch(`${BASE_URL}/${activeTab}/${activePK}/${id}`, { method: "DELETE" });
          loadData();
        }
      }

      function switchTab(tab, pk, event) {
        activeTab = tab;
        activePK = pk;
        document.querySelectorAll(".nav-btn").forEach((b) => b.classList.remove("active"));
        event.currentTarget.classList.add("active");
        document.getElementById("viewTitle").innerText = tab + " Management";
        renderUI();
      }

      window.onload = renderUI;
    </script>
  </body>
</html>
