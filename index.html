<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BPIT Admin Pro | Elite Edition</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap");

      :root {
        /* Dark Mode (High Contrast) */
        --bg: radial-gradient(circle at 50% -20%, #1a2333 0%, #0b0f1a 70%);
        --sidebar: #0f172a;
        --card: rgba(30, 41, 59, 0.5);
        --accent-start: #38bdf8;
        --accent-end: #818cf8;
        --accent: linear-gradient(135deg, var(--accent-start), var(--accent-end));
        --text-primary: #f1f5f9;
        --text-secondary: #94a3b8;
        --border: rgba(255, 255, 255, 0.06);
        --glass: blur(16px) saturate(180%);
      }

      [data-theme="light"] {
        /* Vibrant Light Mode */
        --bg: #f8fafc;
        --sidebar: #ffffff;
        --card: #ffffff;
        --accent-start: #4f46e5; /* Indigo */
        --accent-end: #0ea5e9;   /* Sky Blue */
        --accent: linear-gradient(135deg, var(--accent-start), var(--accent-end));
        --text-primary: #1e293b;   /* Deep Slate instead of Black */
        --text-secondary: #64748b; /* Soft Muted Slate */
        --border: #e2e8f0;
        --glass: none;
      }

      /* --- ANIMATIONS --- */
      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-5px); }
      }

      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(25px); }
        to { opacity: 1; transform: translateY(0); }
      }

      body {
        font-family: "Plus Jakarta Sans", sans-serif;
        background: var(--bg);
        color: var(--text-primary);
        margin: 0;
        display: flex;
        min-height: 100vh;
        transition: all 0.4s ease;
      }

      .sidebar {
        width: 260px;
        background: var(--sidebar);
        height: 100vh;
        position: fixed;
        padding: 40px 20px;
        border-right: 1px solid var(--border);
        box-shadow: 4px 0 24px rgba(0,0,0,0.02);
        z-index: 1000;
      }

      /* Cool Gradient Font for Titles */
      .logo-text {
        background: var(--accent);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        font-weight: 800;
        font-size: 26px;
        margin-bottom: 40px;
        display: inline-block;
        animation: float 4s ease-in-out infinite;
      }

      h1 {
        font-weight: 800;
        letter-spacing: -0.02em;
        background: linear-gradient(to right, var(--text-primary), var(--text-secondary));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .main {
        margin-left: 300px;
        padding: 40px;
        width: calc(100% - 300px);
      }

      .card {
        background: var(--card);
        backdrop-filter: var(--glass);
        padding: 30px;
        border-radius: 24px;
        border: 1px solid var(--border);
        margin-bottom: 30px;
        box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05);
        animation: fadeInUp 0.7s ease-out forwards;
      }

      .nav-btn {
        width: 100%;
        padding: 14px 18px;
        margin-bottom: 8px;
        background: transparent;
        border: none;
        color: var(--text-secondary);
        font-weight: 600;
        border-radius: 12px;
        cursor: pointer;
        transition: all 0.2s;
        text-align: left;
      }

      .nav-btn.active {
        background: var(--accent);
        color: white;
        box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.2);
      }

      .nav-btn:hover:not(.active) {
        background: rgba(79, 70, 229, 0.05);
        color: var(--accent-start);
      }

      /* Fancy Inputs */
      input {
        background: var(--bg);
        border: 2px solid var(--border);
        color: var(--text-primary);
        padding: 12px 16px;
        border-radius: 10px;
        font-weight: 500;
        font-family: inherit;
        transition: all 0.2s;
      }

      input:focus {
        border-color: var(--accent-start);
        outline: none;
        box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
      }

      .btn-add {
        background: var(--accent);
        color: white;
        font-weight: 700;
        border: none;
        border-radius: 10px;
        padding: 12px;
        cursor: pointer;
        transition: transform 0.2s;
      }

      .btn-add:hover { transform: translateY(-2px); }

      /* Table Styles */
      table { width: 100%; border-collapse: collapse; }
      th { 
        text-align: left; 
        color: var(--text-secondary); 
        font-size: 11px; 
        text-transform: uppercase; 
        letter-spacing: 0.1em; 
        padding: 15px; 
        border-bottom: 2px solid var(--border);
      }
      td { padding: 15px; border-bottom: 1px solid var(--border); font-size: 14px; font-weight: 500; }
      
      [data-theme="light"] td { color: #334155; }

      @media (max-width: 992px) {
        .sidebar { position: relative; width: 100%; height: auto; padding: 20px; border-right: none; }
        .main { margin-left: 0; width: 100%; box-sizing: border-box; }
      }
    </style>
  </head>
  <body>
    <nav class="sidebar">
      <div class="logo-text">BPIT Admin</div>
      <button id="theme-toggle" class="nav-btn" style="text-align:center; border: 1px solid var(--border); margin-bottom: 20px;">🌙 Toggle Theme</button>
      <div class="nav-btn-container">
        <button class="nav-btn active" onclick="switchTab('STUDENTS', 'RollNo', event)">Students</button>
        <button class="nav-btn" onclick="switchTab('FACULTY', 'FacultyID', event)">Faculty</button>
        <button class="nav-btn" onclick="switchTab('COURSES', 'CourseNo', event)">Courses</button>
        <button class="nav-btn" onclick="switchTab('DEPARTMENTS', 'DeptID', event)">Departments</button>
        <button class="nav-btn" onclick="switchTab('COLLEGES', 'CollegeID', event)">Colleges</button>
      </div>
    </nav>

    <main class="main">
      <div class="card">
        <h1 id="viewTitle" style="margin-top: 0;">STUDENTS Management</h1>
        <form id="dataForm" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px;"></form>
      </div>

      <div
