<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BPIT Admin | Ultra-Vibrant Edition</title>
    <style>
      /* Using a bolder font variant for maximum impact */
      @import url("https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&display=swap");

      :root {
        /* DARK MODE: Neon & Deep Space */
        --bg: #050810;
        --sidebar: #0a0f1d;
        --card: #111827;
        --accent-start: #00f2ff; /* Cyber Cyan */
        --accent-end: #7000ff;   /* Electric Purple */
        --accent: linear-gradient(135deg, var(--accent-start), var(--accent-end));
        --text-primary: #ffffff;
        --text-secondary: #00d4ff; /* Bright Cyan instead of grey */
        --border: #1f2937;
        --input-bg: #0f172a;
        --shadow: 0 0 20px rgba(0, 242, 255, 0.15);
      }

      [data-theme="light"] {
        /* LIGHT MODE: High-Saturation Indigo */
        --bg: #f0f4ff;
        --sidebar: #ffffff;
        --card: #ffffff;
        --accent-start: #4338ca; /* Bold Indigo */
        --accent-end: #0ea5e9;   /* Bold Sky */
        --accent: linear-gradient(135deg, var(--accent-start), var(--accent-end));
        --text-primary: #1e1b4b; /* Deep Indigo - NOT black */
        --text-secondary: #4338ca; /* Saturated Violet */
        --border: #cbd5e1;
        --input-bg: #f8fafc;
        --shadow: 0 10px 30px rgba(67, 56, 202, 0.1);
      }

      body {
        font-family: "Plus Jakarta Sans", sans-serif;
        background: var(--bg);
        color: var(--text-primary);
        margin: 0;
        display: flex;
        min-height: 100vh;
        transition: 0.3s;
      }

      /* --- SIDEBAR --- */
      .sidebar {
        width: 260px;
        background: var(--sidebar);
        padding: 40px 20px;
        border-right: 3px solid var(--accent-start); /* Bold Border */
        height: 100vh;
        position: fixed;
      }

      .logo-text {
        font-size: 32px;
        font-weight: 800;
        background: var(--accent);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        filter: drop-shadow(0 0 10px rgba(0, 242, 255, 0.3));
        margin-bottom: 50px;
        display: block;
      }

      .nav-btn {
        width: 100%;
        padding: 18px;
        margin-bottom: 12px;
        background: transparent;
        border: 2px solid transparent;
        color: var(--text-secondary);
        font-weight: 800; /* Extra bold for visibility */
        border-radius: 12px;
        cursor: pointer;
        text-align: left;
        transition: 0.2s;
      }

      .nav-btn.active {
        background: var(--accent);
        color: white;
        box-shadow: var(--shadow);
      }

      .nav-btn:hover:not(.active) {
        border-color: var(--accent-start);
        background: rgba(0, 242, 255, 0.05);
      }

      /* --- MAIN CONTENT --- */
      .main { margin-left: 300px; padding: 40px; width: calc(100% - 300px); }

      h1 {
        font-size: 42px;
        font-weight: 800;
        letter-spacing: -2px;
        color: var(--text-primary);
        text-shadow: 2px 2px 0px var(--accent-start); /* Retro Pop effect */
        margin-bottom: 40px;
      }

      [data-theme="light"] h1 {
        text-shadow: 2px 2px 0px #cbd5e1;
      }

      .card {
        background: var(--card);
        padding: 30px;
        border-radius: 20px;
        border: 2px solid var(--border);
        box-shadow: var(--shadow);
        margin-bottom: 30px;
      }

      /* --- INPUTS --- */
      input {
        background: var(--input-bg);
        border: 2px solid var(--accent-start);
        color: var(--text-primary);
        padding: 15px;
        border-radius: 12px;
        font-weight: 700;
        font-size: 16px;
      }

      input::placeholder { color: var(--text-secondary); opacity: 0.7; }

      .btn-add {
        background: var(--accent);
        color: white;
        font-weight: 800;
        border: none;
        border-radius: 12px;
        padding: 15px;
        cursor: pointer;
        box-shadow: 0 5px 15px rgba(112, 0, 255, 0.4);
      }

      /* --- TABLE --- */
      table { width: 100%; border-collapse: collapse; }
      th { 
        color: var(--accent-start); 
        font-weight: 800; 
        text-transform: uppercase; 
        padding: 15px; 
        border-bottom: 3px solid var(--accent-start);
        letter-spacing: 1px;
      }
      td { 
        padding: 15px; 
        border-bottom: 1px solid var(--border); 
        font-weight: 700; 
        font-size: 15px;
      }

      /* Theme Toggle Styles */
      #theme-toggle {
        background: var(--accent);
        color: white;
        border: none;
        margin-bottom: 40px;
      }
    </style>
  </head>
  <body>
    <nav class="sidebar">
      <span class="logo-text">BPIT PRO</span>
      <button id="theme-toggle" class="nav-btn" style="text-align: center;">Toggle Theme</button>
      <div class="nav-btn-container">
        <button class="nav-btn active" onclick="switchTab('STUDENTS', 'RollNo', event)">Students</button>
        <button class="nav-btn" onclick="switchTab('FACULTY', 'FacultyID', event)">Faculty</button>
        <button class="nav-btn" onclick="switchTab('COURSES', 'CourseNo', event)">Courses</button>
        <button class="nav-btn" onclick="switchTab('DEPARTMENTS', 'DeptID', event)">Departments</button>
        <button class="nav-btn" onclick="switchTab('COLLEGES', 'CollegeID', event)">Colleges</button>
      </div>
    </nav>

    <main class="main">
      <div class="card">
        <h1 id="viewTitle">STUDENTS</h1>
        <form id="dataForm" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 20px;"></form>
      </div>

      <div class="card">
        <div style="overflow-x: auto;">
          <table>
            <thead id="thead"></thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
      </div>
    </main>

    <script>
      let activeTab = "STUDENTS";
      let activePK = "RollNo";
      const BASE_URL = "https://bpit-university-dbms.onrender.com/api";

      // Toggle Theme
      const themeToggle = document.getElementById('theme-toggle');
      themeToggle.onclick = () => {
        const doc = document.documentElement;
        const isLight = doc.getAttribute('data-theme') === 'light';
        doc.setAttribute('data-theme', isLight ? 'dark' : 'light');
      };

      const schema = {
        STUDENTS: ["RollNo", "Name", "Year", "Address", "Contact_No"],
        FACULTY: ["FacultyID", "Name", "Designation", "Qualification", "DeptID"],
        COURSES: ["CourseNo", "Course_Title", "Year", "DeptID"],
        DEPARTMENTS: ["DeptID", "Dept_Name", "HOD_Name", "CollegeID"],
        COLLEGES: ["CollegeID", "Name", "Address", "Contact_No"],
      };

      async function loadData() {
        const tb = document.getElementById("tbody");
        const th = document.getElementById("thead");
        tb.innerHTML = "<tr><td colspan='100%' style='color:var(--accent-start)'>Connecting to Neon Cloud...</td></tr>";
        try {
          const res = await fetch(`${BASE_URL}/${activeTab}`);
          const data = await res.json();
          if (data && data.length > 0) {
            const cols = Object.keys(data[0]);
            th.innerHTML = `<tr>${cols.map(c => `<th>${c}</th>`).join("")}<th></th></tr>`;
            tb.innerHTML = data.map(row => `<tr>${cols.map(c => `<td>${row[c] || ""}</td>`).join("")}
              <td><button style="color:#ff0055; border:none; background:none; cursor:pointer; font-weight:800;" onclick="del('${row[activePK]}')">DELETE</button></td></tr>`).join("");
          } else { tb.innerHTML = "<tr><td>Empty Table</td></tr>"; }
        } catch (e) { tb.innerHTML = "<tr><td>Error. Check API.</td></tr>"; }
      }

      function renderUI() {
        const form = document.getElementById("dataForm");
        form.innerHTML = schema[activeTab].map(f => `<input id="${f}" placeholder="${f}" required>`).join("") 
                        + `<button type="submit" class="btn-add">Add Entry</button>`;
        loadData();
      }

      document.getElementById("dataForm").onsubmit = async (e) => {
        e.preventDefault();
        const body = {};
        schema[activeTab].forEach(f => body[f] = document.getElementById(f).value);
        await fetch(`${BASE_URL}/${activeTab}`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) });
        e.target.reset(); loadData();
      };

      async function del(id) {
        if(confirm("Confirm Delete?")) {
          await fetch(`${BASE_URL}/${activeTab}/${activePK}/${id}`, { method: "DELETE" });
          loadData();
        }
      }

      function switchTab(tab, pk, event) {
        activeTab = tab; activePK = pk;
        document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
        event.currentTarget.classList.add("active");
        document.getElementById("viewTitle").innerText = tab;
        renderUI();
      }

      window.onload = renderUI;
    </script>
  </body>
</html>
