<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BPIT Admin Pro | Elite Edition</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap");

      :root {
        --bg: radial-gradient(circle at 50% -20%, #1a2333 0%, #0b0f1a 70%);
        --sidebar: #111827;
        --card: rgba(31, 41, 55, 0.4);
        --accent-start: #60a5fa;
        --accent-end: #a78bfa;
        --accent: linear-gradient(135deg, var(--accent-start), var(--accent-end));
        --text-primary: #f8fafc;
        --text-secondary: #94a3b8;
        --border: rgba(255, 255, 255, 0.05);
        --glass: blur(15px) saturate(180%);
      }

      [data-theme="light"] {
        --bg: #f1f5f9;
        --sidebar: #ffffff;
        --card: rgba(255, 255, 255, 0.9);
        --accent-start: #2563eb;
        --accent-end: #7c3aed;
        --accent: linear-gradient(135deg, var(--accent-start), var(--accent-end));
        --text-primary: #1e293b;
        --text-secondary: #64748b;
        --border: rgba(0, 0, 0, 0.05);
      }

      /* --- ELITE KEYFRAMES --- */
      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-5px); }
      }

      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(30px); filter: blur(10px); }
        to { opacity: 1; transform: translateY(0); filter: blur(0); }
      }

      @keyframes slideInRight {
        from { opacity: 0; transform: translateX(-20px); }
        to { opacity: 1; transform: translateX(0); }
      }

      @keyframes pulseGlow {
        0% { box-shadow: 0 0 5px rgba(96, 165, 250, 0.2); transform: scale(1); }
        50% { box-shadow: 0 0 20px rgba(96, 165, 250, 0.4); transform: scale(1.02); }
        100% { box-shadow: 0 0 5px rgba(96, 165, 250, 0.2); transform: scale(1); }
      }

      body {
        font-family: "Plus Jakarta Sans", sans-serif;
        background: var(--bg);
        color: var(--text-primary);
        margin: 0;
        display: flex;
        min-height: 100vh;
        transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .sidebar {
        width: 260px;
        background: var(--sidebar);
        height: 100vh;
        position: fixed;
        padding: 40px 20px;
        border-right: 1px solid var(--border);
        z-index: 1000;
      }

      .logo-text {
        background: var(--accent);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        font-weight: 800;
        font-size: 26px;
        margin-bottom: 40px;
        display: inline-block;
        animation: float 4s ease-in-out infinite;
      }

      .main {
        margin-left: 300px;
        padding: 40px;
        width: calc(100% - 300px);
      }

      .card {
        background: var(--card);
        backdrop-filter: var(--glass);
        padding: 30px;
        border-radius: 30px;
        border: 1px solid var(--border);
        margin-bottom: 30px;
        animation: fadeInUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        opacity: 0;
      }

      .card:nth-child(1) { animation-delay: 0.1s; }
      .card:nth-child(2) { animation-delay: 0.3s; }

      .nav-btn {
        width: 100%;
        padding: 16px;
        margin-bottom: 12px;
        background: transparent;
        border: none;
        color: var(--text-secondary);
        font-weight: 600;
        border-radius: 16px;
        cursor: pointer;
        transition: 0.3s all;
        text-align: left;
      }

      .nav-btn.active {
        background: var(--accent);
        color: white;
        animation: pulseGlow 3s infinite;
      }

      .nav-btn:hover:not(.active) {
        background: rgba(255, 255, 255, 0.05);
        padding-left: 24px; /* Slide effect on hover */
      }

      /* Staggered form inputs */
      #dataForm input {
        opacity: 0;
        animation: slideInRight 0.5s ease forwards;
        background: rgba(0,0,0,0.2);
        border: 1px solid var(--border);
        color: white;
        padding: 14px;
        border-radius: 12px;
      }

      #dataForm input:nth-child(1) { animation-delay: 0.2s; }
      #dataForm input:nth-child(2) { animation-delay: 0.3s; }
      #dataForm input:nth-child(3) { animation-delay: 0.4s; }
      #dataForm input:nth-child(4) { animation-delay: 0.5s; }
      #dataForm input:nth-child(5) { animation-delay: 0.6s; }

      .btn-add {
        background: var(--accent);
        border: none;
        color: white;
        font-weight: 800;
        border-radius: 12px;
        cursor: pointer;
        transition: 0.3s;
      }

      .btn-add:active { transform: scale(0.95); }

      table { width: 100%; border-collapse: collapse; }
      tr { transition: 0.3s; }
      tr:hover td { background: rgba(255,255,255,0.02); }

      @media (max-width: 992px) {
        .sidebar { position: relative; width: 100%; height: auto; padding: 20px; border-right: none; }
        .main { margin-left: 0; width: 100%; box-sizing: border-box; }
        .nav-btn-container { display: flex; overflow-x: auto; gap: 10px; }
      }
    </style>
  </head>
  <body>
    <nav class="sidebar">
      <div class="logo-text">BPIT Admin</div>
      <button id="theme-toggle" class="nav-btn" style="text-align:center; border:1px solid var(--border)">🌙 Mode</button>
      <div class="nav-btn-container">
        <button class="nav-btn active" onclick="switchTab('STUDENTS', 'RollNo', event)">Students</button>
        <button class="nav-btn" onclick="switchTab('FACULTY', 'FacultyID', event)">Faculty</button>
        <button class="nav-btn" onclick="switchTab('COURSES', 'CourseNo', event)">Courses</button>
        <button class="nav-btn" onclick="switchTab('DEPARTMENTS', 'DeptID', event)">Departments</button>
        <button class="nav-btn" onclick="switchTab('COLLEGES', 'CollegeID', event)">Colleges</button>
      </div>
    </nav>

    <main class="main">
      <div class="card">
        <h1 id="viewTitle" style="margin: 0 0 20px 0;">STUDENTS Management</h1>
        <form id="dataForm" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px;"></form>
      </div>

      <div class="card">
        <div style="overflow-x: auto;">
          <table>
            <thead id="thead"></thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
      </div>
    </main>

    <script>
      let activeTab = "STUDENTS";
      let activePK = "RollNo";
      const BASE_URL = "https://bpit-university-dbms.onrender.com/api";

      // Theme logic
      const themeToggle = document.getElementById('theme-toggle');
      themeToggle.onclick = () => {
        const isLight = document.documentElement.getAttribute('data-theme') === 'light';
        document.documentElement.setAttribute('data-theme', isLight ? 'dark' : 'light');
        themeToggle.innerText = isLight ? '🌙 Mode' : '☀️ Mode';
      };

      const schema = {
        STUDENTS: ["RollNo", "Name", "Year", "Address", "Contact_No"],
        FACULTY: ["FacultyID", "Name", "Designation", "Qualification", "DeptID"],
        COURSES: ["CourseNo", "Course_Title", "Year", "DeptID"],
        DEPARTMENTS: ["DeptID", "Dept_Name", "HOD_Name", "CollegeID"],
        COLLEGES: ["CollegeID", "Name", "Address", "Contact_No"],
      };

      function renderUI() {
        const form = document.getElementById("dataForm");
        form.innerHTML = schema[activeTab].map(f => `<input id="${f}" placeholder="${f}" required>`).join("") 
                        + `<button type="submit" class="btn-add">Add Entry</button>`;
        loadData();
      }

      async function loadData() {
        const tb = document.getElementById("tbody");
        const th = document.getElementById("thead");
        tb.innerHTML = "<tr><td colspan='100%'>Fetching data...</td></tr>";
        try {
          const res = await fetch(`${BASE_URL}/${activeTab}`);
          const data = await res.json();
          if (data && data.length > 0) {
            const cols = Object.keys(data[0]);
            th.innerHTML = `<tr>${cols.map(c => `<th style="text-align:left; color:var(--text-secondary); padding:15px; font-size:12px;">${c}</th>`).join("")}<th></th></tr>`;
            tb.innerHTML = data.map(row => `<tr style="border-bottom: 1px solid var(--border)">${cols.map(c => `<td style="padding:15px;">${row[c] || ""}</td>`).join("")}
              <td><button style="color:#ff4d4d; border:none; background:none; cursor:pointer;" onclick="del('${row[activePK]}')">Delete</button></td></tr>`).join("");
          }
        } catch (e) { tb.innerHTML = "<tr><td>Offline</td></tr>"; }
      }

      document.getElementById("dataForm").onsubmit = async (e) => {
        e.preventDefault();
        const body = {};
        schema[activeTab].forEach(f => body[f] = document.getElementById(f).value);
        await fetch(`${BASE_URL}/${activeTab}`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) });
        e.target.reset(); renderUI(); // re-render to trigger input animations
      };

      async function del(id) {
        if(confirm("Delete entry?")) {
          await fetch(`${BASE_URL}/${activeTab}/${activePK}/${id}`, { method: "DELETE" });
          loadData();
        }
      }

      function switchTab(tab, pk, event) {
        activeTab = tab; activePK = pk;
        document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
        event.currentTarget.classList.add("active");
        document.getElementById("viewTitle").innerText = tab + " Management";
        renderUI();
      }

      window.onload = renderUI;
    </script>
  </body>
</html>
