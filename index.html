<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BPIT University Management | Admin Dashboard Pro</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap");

      :root {
        /* Modern Sexy Dark Theme */
        --bg: radial-gradient(circle at 50% -20%, #1a2333 0%, #0b0f1a 70%);
        --sidebar: #111827;
        --card: rgba(31, 41, 55, 0.6);
        --accent-start: #60a5fa; /* Blue */
        --accent-end: #a78bfa;   /* Purple */
        --accent: linear-gradient(135deg, var(--accent-start), var(--accent-end));
        --glow: 0 0 15px rgba(96, 165, 250, 0.3);
        
        --text-primary: #f8fafc;
        --text-secondary: #94a3b8;
        --border: rgba(255, 255, 255, 0.03);
        --input-bg: rgba(0, 0, 0, 0.3);
        --glass: blur(12px) saturate(180%);
      }

      [data-theme="light"] {
        /* Professional Light Theme */
        --bg: #f8fafc;
        --sidebar: #ffffff;
        --card: rgba(255, 255, 255, 0.9);
        --accent-start: #2563eb;
        --accent-end: #7c3aed;
        --accent: linear-gradient(135deg, var(--accent-start), var(--accent-end));
        --glow: 0 4px 6px rgba(37, 99, 235, 0.1);
        
        --text-primary: #0f172a;
        --text-secondary: #475569;
        --border: rgba(0, 0, 0, 0.05);
        --input-bg: #f1f5f9;
        --glass: blur(12px) saturate(180%);
      }

      body {
        font-family: "Plus Jakarta Sans", sans-serif;
        background: var(--bg);
        color: var(--text-primary);
        margin: 0;
        display: flex;
        flex-direction: row;
        min-height: 100vh;
        transition: background 0.3s ease;
      }

      /* Sidebar (Modern Flat) */
      .sidebar {
        width: 260px;
        background: var(--sidebar);
        height: 100vh;
        position: fixed;
        padding: 40px 20px;
        border-right: 1px solid var(--border);
        transition: 0.3s;
        z-index: 1000;
        overflow-y: auto;
      }

      .main {
        margin-left: 300px;
        padding: 40px;
        width: calc(100% - 300px);
        transition: 0.3s;
      }

      /* Logo Gradient */
      .logo-text {
        margin-bottom: 25px;
        background: var(--accent);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        font-weight: 800;
        letter-spacing: -0.5px;
      }

      /* Sexy Buttons (Sidebar) */
      .nav-btn {
        display: flex;
        align-items: center;
        width: 100%;
        padding: 14px 18px;
        margin-bottom: 8px;
        background: transparent;
        border: 1px solid transparent;
        color: var(--text-secondary);
        font-size: 16px;
        font-weight: 600;
        text-align: left;
        cursor: pointer;
        border-radius: 14px;
        transition: all 0.25s ease;
      }

      .nav-btn:hover {
        background: rgba(96, 165, 250, 0.05);
        border-color: rgba(96, 165, 250, 0.1);
        color: var(--text-primary);
      }

      .nav-btn.active {
        background: var(--accent);
        color: #fff;
        box-shadow: var(--glow), 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      }

      #theme-toggle {
        background: rgba(96, 165, 250, 0.05);
        border: 1px solid rgba(96, 165, 250, 0.2);
        color: var(--accent-start);
        margin-bottom: 30px;
        justify-content: center;
        box-shadow: var(--glow);
      }

      #theme-toggle:hover {
        background: rgba(96, 165, 250, 0.1);
        border-color: var(--accent-start);
      }

      /* Modern Responsive Sidebar */
      @media (max-width: 992px) {
        body { flex-direction: column; }
        .sidebar {
          width: 100%;
          height: auto;
          position: relative;
          padding: 20px;
          border-right: none;
          border-bottom: 1px solid var(--border);
        }
        .main {
          margin-left: 0;
          padding: 20px;
          width: 100%;
          box-sizing: border-box;
        }
        .nav-btn-container {
          display: flex;
          overflow-x: auto;
          gap: 10px;
          padding-bottom: 10px;
        }
        .nav-btn {
          white-space: nowrap;
          min-width: max-content;
          margin-bottom: 0 !important;
        }
      }

      /* Sexy Cards (Glassmorphism) */
      .card {
        background: var(--card);
        backdrop-filter: var(--glass);
        -webkit-backdrop-filter: var(--glass);
        padding: 30px;
        border-radius: 28px;
        border: 1px solid var(--border);
        margin-bottom: 30px;
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2), 0 4px 6px -2px rgba(0, 0, 0, 0.1);
      }

      .form-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 15px;
      }

      input {
        background: var(--input-bg);
        border: 1px solid var(--border);
        color: var(--text-primary);
        padding: 14px;
        border-radius: 10px;
        font-size: 15px;
        width: 100%;
        box-sizing: border-box;
        transition: 0.2s;
      }

      input:focus {
        outline: none;
        border-color: rgba(96, 165, 250, 0.4);
        box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.1);
      }

      .btn-add {
        background: var(--accent);
        color: white;
        font-weight: 800;
        border: none;
        padding: 14px;
        border-radius: 10px;
        cursor: pointer;
        transition: 0.2s ease;
        text-shadow: 0 1px 2px rgba(0,0,0,0.2);
      }

      .btn-add:hover {
        opacity: 0.9;
        transform: translateY(-1px);
        box-shadow: var(--glow), 0 5px 10px rgba(0,0,0,0.2);
      }

      /* Modern Table UI */
      .table-container {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
      }

      table {
        width: 100%;
        min-width: 650px;
        border-collapse: collapse;
      }

      th {
        text-align: left;
        color: var(--text-secondary);
        padding: 18px 15px;
        border-bottom: 1px solid var(--border);
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      td {
        padding: 18px 15px;
        border-bottom: 1px solid var(--border);
        font-size: 0.98rem;
        transition: 0.2s;
      }

      tr:hover td {
        background: rgba(255, 255, 255, 0.015);
      }

      .btn-del {
        color: #fff;
        background: linear-gradient(135deg, #f43f5e, #fb7185);
        border: none;
        padding: 7px 14px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
        font-size: 0.8rem;
        transition: 0.2s;
        box-shadow: 0 4px 6px rgba(244, 63, 94, 0.15);
      }

      .btn-del:hover {
        opacity: 0.9;
        transform: translateY(-1px);
        box-shadow: 0 6px 12px rgba(244, 63, 94, 0.25);
      }
    </style>
  </head>
  <body>
    <nav class="sidebar">
      <h2 class="logo-text">BPIT Admin PRO</h2>
      
      <button id="theme-toggle" class="nav-btn">🌙 Dark Mode</button>

      <div class="nav-btn-container">
        <button class="nav-btn active" onclick="switchTab('STUDENTS', 'RollNo', event)">Students</button>
        <button class="nav-btn" onclick="switchTab('FACULTY', 'FacultyID', event)">Faculty</button>
        <button class="nav-btn" onclick="switchTab('COURSES', 'CourseNo', event)">Courses</button>
        <button class="nav-btn" onclick="switchTab('DEPARTMENTS', 'DeptID', event)">Departments</button>
        <button class="nav-btn" onclick="switchTab('COLLEGES', 'CollegeID', event)">Colleges</button>
      </div>
    </nav>

    <main class="main">
      <div class="card">
        <h1 id="viewTitle" style="margin-top:0; font-weight:800;">STUDENTS Management</h1>
        <form id="dataForm" class="form-grid"></form>
      </div>

      <div class="card">
        <div class="table-container">
          <table>
            <thead id="thead"></thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
      </div>
    </main>

    <script>
      let activeTab = "STUDENTS";
      let activePK = "RollNo";
      const BASE_URL = "https://bpit-university-dbms.onrender.com/api";

      const themeToggle = document.getElementById('theme-toggle');
      themeToggle.addEventListener('click', () => {
        const isLight = document.documentElement.getAttribute('data-theme') === 'light';
        document.documentElement.setAttribute('data-theme', isLight ? 'dark' : 'light');
        themeToggle.innerText = isLight ? '🌙 Dark Mode' : '☀️ Light Mode';
      });

      const schema = {
        STUDENTS: ["RollNo", "Name", "Year", "Address", "Contact_No"],
        FACULTY: ["FacultyID", "Name", "Designation", "Qualification", "DeptID"],
        COURSES: ["CourseNo", "Course_Title", "Year", "DeptID"],
        DEPARTMENTS: ["DeptID", "Dept_Name", "HOD_Name", "CollegeID"],
        COLLEGES: ["CollegeID", "Name", "Address", "Contact_No"],
      };

      function renderUI() {
        const form = document.getElementById("dataForm");
        form.innerHTML = schema[activeTab]
          .map((f) => `<input id="${f}" placeholder="${f}" required>`)
          .join("") +
          `<button type="submit" class="btn-add">Add Entry</button>`;
        loadData();
      }

      async function loadData() {
        const tb = document.getElementById("tbody");
        const th = document.getElementById("thead");
        tb.innerHTML = "<tr><td colspan='100%'>Loading secure database...</td></tr>";

        try {
          const res = await fetch(`${BASE_URL}/${activeTab}`);
          const data = await res.json();

          if (data && data.length > 0) {
            const cols = Object.keys(data[0]);
            th.innerHTML = `<tr>${cols.map((c) => `<th>${c}</th>`).join("")}<th>Action</th></tr>`;
            tb.innerHTML = data.map((row) => `
              <tr>
                ${cols.map((c) => `<td>${row[c] || ""}</td>`).join("")}
                <td><button class="btn-del" onclick="del('${row[activePK]}')">Delete</button></td>
              </tr>
            `).join("");
          } else {
            tb.innerHTML = "<tr><td colspan='100%'>No records found.</td></tr>";
          }
        } catch (err) {
          tb.innerHTML = "<tr><td colspan='100%'>Error connecting to server.</td></tr>";
        }
      }

      document.getElementById("dataForm").onsubmit = async (e) => {
        e.preventDefault();
        const body = {};
        schema[activeTab].forEach(f => body[f] = document.getElementById(f).value);

        await fetch(`${BASE_URL}/${activeTab}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });
        e.target.reset();
        loadData();
      };

      async function del(id) {
        if (confirm(`Delete ID: ${id}?`)) {
          await fetch(`${BASE_URL}/${activeTab}/${activePK}/${id}`, { method: "DELETE" });
          loadData();
        }
      }

      function switchTab(tab, pk, event) {
        activeTab = tab;
        activePK = pk;
        document.querySelectorAll(".nav-btn").forEach((b) => b.classList.remove("active"));
        event.currentTarget.classList.add("active");
        document.getElementById("viewTitle").innerText = tab + " Management";
        renderUI();
      }

      window.onload = renderUI;
    </script>
  </body>
</html>
