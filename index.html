<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BPIT Admin | Aurora Glass</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap");

      :root {
        /* Eye-Smoothing Dark: Deep Navy & Soft Mint/Violet */
        --bg: #0b0f1a;
        --sidebar: rgba(15, 23, 42, 0.8);
        --card: rgba(23, 32, 53, 0.6);
        --accent-1: #4ade80; /* Soft Emerald */
        --accent-2: #818cf8; /* Soft Indigo */
        --accent-3: #f472b6; /* Soft Rose */
        --text-primary: #f1f5f9;
        --text-secondary: #94a3b8;
        --border: rgba(255, 255, 255, 0.08);
        --input-bg: rgba(10, 15, 28, 0.5);
      }

      [data-theme="light"] {
        /* Eye-Smoothing Light: Soft Cream & Pastel Indigo */
        --bg: #f8fafc;
        --sidebar: rgba(255, 255, 255, 0.8);
        --card: rgba(255, 255, 255, 0.9);
        --accent-1: #059669;
        --accent-2: #4f46e5;
        --accent-3: #db2777;
        --text-primary: #1e293b;
        --text-secondary: #64748b;
        --border: rgba(0, 0, 0, 0.05);
        --input-bg: #ffffff;
      }

      body {
        font-family: "Plus Jakarta Sans", sans-serif;
        background: var(--bg);
        background-image: 
            radial-gradient(at 0% 0%, rgba(74, 222, 128, 0.05) 0px, transparent 50%),
            radial-gradient(at 100% 100%, rgba(129, 140, 248, 0.05) 0px, transparent 50%);
        color: var(--text-primary);
        margin: 0;
        display: flex;
        min-height: 100vh;
        transition: 0.5s ease;
      }

      /* --- GLASS SIDEBAR --- */
      .sidebar {
        width: 260px;
        background: var(--sidebar);
        backdrop-filter: blur(20px);
        padding: 40px 24px;
        border-right: 1px solid var(--border);
        height: 100vh;
        position: fixed;
        box-shadow: 10px 0 30px rgba(0,0,0,0.1);
      }

      .logo-text {
        font-size: 22px;
        font-weight: 800;
        letter-spacing: -0.5px;
        background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 40px;
        display: block;
      }

      .nav-btn {
        width: 100%;
        padding: 12px 16px;
        margin-bottom: 10px;
        background: transparent;
        border: 1px solid transparent;
        color: var(--text-secondary);
        font-weight: 600;
        border-radius: 14px;
        cursor: pointer;
        text-align: left;
        transition: 0.3s;
        font-size: 14px;
      }

      .nav-btn.active {
        background: var(--card);
        border: 1px solid var(--border);
        color: var(--accent-1);
        box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        transform: translateX(5px);
      }

      .nav-btn:hover:not(.active) {
        color: var(--text-primary);
        background: rgba(255,255,255,0.03);
      }

      /* --- MAIN CONTENT --- */
      .main { margin-left: 300px; padding: 50px; width: calc(100% - 300px); }

      .view-header {
        margin-bottom: 40px;
      }

      h1 {
        font-size: 36px;
        font-weight: 800;
        margin: 0;
        background: linear-gradient(to bottom right, var(--text-primary) 30%, var(--accent-2));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        letter-spacing: -1px;
      }

      .card {
        background: var(--card);
        backdrop-filter: blur(12px);
        padding: 30px;
        border-radius: 24px;
        border: 1px solid var(--border);
        box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        margin-bottom: 30px;
      }

      /* --- INPUTS --- */
      input {
        background: var(--input-bg);
        border: 1px solid var(--border);
        color: var(--text-primary);
        padding: 14px 18px;
        border-radius: 12px;
        font-weight: 500;
        font-size: 14px;
        transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }

      input:focus {
        outline: none;
        border-color: var(--accent-1);
        background: rgba(255,255,255,0.02);
      }

      .btn-add {
        background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
        color: #000; /* Dark text on bright button for readability */
        font-weight: 800;
        border: none;
        border-radius: 12px;
        padding: 14px;
        cursor: pointer;
        font-size: 14px;
        transition: 0.3s;
      }

      .btn-add:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(74, 222, 128, 0.2);
      }

      /* --- TABLE --- */
      table { width: 100%; border-collapse: collapse; }
      th { 
        color: var(--text-secondary); 
        font-weight: 700; 
        font-size: 12px;
        text-transform: uppercase; 
        letter-spacing: 1px;
        padding: 16px; 
        border-bottom: 1px solid var(--border);
        text-align: left;
      }
      td { 
        padding: 16px; 
        border-bottom: 1px solid var(--border); 
        font-weight: 500; 
        font-size: 14px;
        color: var(--text-primary);
      }

      .delete-link {
        color: var(--accent-3);
        text-decoration: none;
        font-weight: 700;
        font-size: 12px;
        cursor: pointer;
        opacity: 0.6;
        transition: 0.3s;
      }

      .delete-link:hover { opacity: 1; text-shadow: 0 0 10px var(--accent-3); }

      /* Mobile Adjustment */
      @media (max-width: 1024px) {
        .sidebar { width: 100%; height: auto; position: relative; border-right: none; border-bottom: 1px solid var(--border); }
        .main { margin-left: 0; padding: 20px; }
        .nav-btn-container { display: flex; overflow-x: auto; gap: 10px; }
      }
    </style>
  </head>
  <body>
    <nav class="sidebar">
      <span class="logo-text">BPIT Elite</span>
      <button id="theme-toggle" class="nav-btn" style="text-align: center; border: 1px solid var(--border); margin-bottom: 30px;">Toggle Aura</button>
      <div class="nav-btn-container">
        <button class="nav-btn active" onclick="switchTab('STUDENTS', 'RollNo', event)">Students</button>
        <button class="nav-btn" onclick="switchTab('FACULTY', 'FacultyID', event)">Faculty</button>
        <button class="nav-btn" onclick="switchTab('COURSES', 'CourseNo', event)">Courses</button>
        <button class="nav-btn" onclick="switchTab('DEPARTMENTS', 'DeptID', event)">Departments</button>
        <button class="nav-btn" onclick="switchTab('COLLEGES', 'CollegeID', event)">Colleges</button>
      </div>
    </nav>

    <main class="main">
      <div class="view-header">
        <h1 id="viewTitle">Students</h1>
      </div>

      <div class="card">
        <form id="dataForm" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px;"></form>
      </div>

      <div class="card" style="padding: 10px;">
        <div style="overflow-x: auto;">
          <table>
            <thead id="thead"></thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
      </div>
    </main>

    <script>
      let activeTab = "STUDENTS";
      let activePK = "RollNo";
      const BASE_URL = "https://bpit-university-dbms.onrender.com/api";

      document.getElementById('theme-toggle').onclick = () => {
        const doc = document.documentElement;
        doc.setAttribute('data-theme', doc.getAttribute('data-theme') === 'light' ? 'dark' : 'light');
      };

      const schema = {
        STUDENTS: ["RollNo", "Name", "Year", "Address", "Contact_No"],
        FACULTY: ["FacultyID", "Name", "Designation", "Qualification", "DeptID"],
        COURSES: ["CourseNo", "Course_Title", "Year", "DeptID"],
        DEPARTMENTS: ["DeptID", "Dept_Name", "HOD_Name", "CollegeID"],
        COLLEGES: ["CollegeID", "Name", "Address", "Contact_No"],
      };

      async function loadData() {
        const tb = document.getElementById("tbody");
        const th = document.getElementById("thead");
        tb.innerHTML = "<tr><td colspan='100%' style='opacity:0.5'>Waking up the database...</td></tr>";
        try {
          const res = await fetch(`${BASE_URL}/${activeTab}`);
          const data = await res.json();
          if (data && data.length > 0) {
            const cols = Object.keys(data[0]);
            th.innerHTML = `<tr>${cols.map(c => `<th>${c}</th>`).join("")}<th></th></tr>`;
            tb.innerHTML = data.map(row => `<tr>${cols.map(c => `<td>${row[c] || ""}</td>`).join("")}
              <td><span class="delete-link" onclick="del('${row[activePK]}')">REMOVE</span></td></tr>`).join("");
          } else { tb.innerHTML = "<tr><td>No data found.</td></tr>"; }
        } catch (e) { tb.innerHTML = "<tr><td>Failed to sync. Check server.</td></tr>"; }
      }

      function renderUI() {
        const form = document.getElementById("dataForm");
        form.innerHTML = schema[activeTab].map(f => `<input id="${f}" placeholder="${f}" required>`).join("") 
                        + `<button type="submit" class="btn-add">Add Entry</button>`;
        loadData();
      }

      document.getElementById("dataForm").onsubmit = async (e) => {
        e.preventDefault();
        const body = {};
        schema[activeTab].forEach(f => body[f] = document.getElementById(f).value);
        await fetch(`${BASE_URL}/${activeTab}`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) });
        e.target.reset(); loadData();
      };

      async function del(id) {
        if(confirm("Permanently delete this entry?")) {
          await fetch(`${BASE_URL}/${activeTab}/${activePK}/${id}`, { method: "DELETE" });
          loadData();
        }
      }

      function switchTab(tab, pk, event) {
        activeTab = tab; activePK = pk;
        document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
        event.currentTarget.classList.add("active");
        document.getElementById("viewTitle").innerText = tab.charAt(0) + tab.slice(1).toLowerCase();
        renderUI();
      }

      window.onload = renderUI;
    </script>
  </body>
</html>
