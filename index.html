<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BPIT Database Management</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

        :root {
            --bg-deep: #050a14;
            --sidebar-bg: #0a1120;
            --card-bg: #0d1629;
            --accent-cyan: #00f2ff;
            --accent-purple: #7000ff;
            --gradient-main: linear-gradient(90deg, #00f2ff, #7000ff);
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --border-color: #1e293b;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-main);
            margin: 0;
            display: flex;
            min-height: 100vh;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 240px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
        }

        .logo {
            font-size: 22px;
            font-weight: 800;
            color: #4facfe;
            margin-bottom: 40px;
            letter-spacing: 1px;
        }

        .logo span { color: #7000ff; }

        .theme-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-dim);
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 30px;
            cursor: pointer;
            font-size: 13px;
        }

        .nav-item {
            padding: 12px 16px;
            border-radius: 8px;
            color: var(--text-dim);
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 10px;
            cursor: pointer;
            transition: 0.3s;
            border: none;
            background: none;
            text-align: left;
            width: 100%;
        }

        .nav-item.active {
            background: var(--gradient-main);
            color: white;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.3);
        }

        .nav-item:hover:not(.active) {
            color: white;
            background: rgba(255,255,255,0.05);
        }

        /* --- MAIN CONTENT --- */
        .main-content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }

        .section-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 32px;
            font-weight: 700;
            margin-top: 0;
            margin-bottom: 10px;
            text-transform: uppercase;
            position: relative;
            display: inline-block;
        }

        h1::after {
            content: '';
            display: block;
            width: 50px;
            height: 4px;
            background: var(--accent-cyan);
            box-shadow: 0 0 10px var(--accent-cyan);
            margin-top: 8px;
            border-radius: 2px;
        }

        /* --- FORM --- */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 25px;
        }

        input {
            background: #050a14;
            border: 1px solid var(--border-color);
            color: white;
            padding: 14px;
            border-radius: 8px;
            outline: none;
        }

        input:focus {
            border-color: var(--accent-cyan);
        }

        .add-btn {
            background: var(--gradient-main);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
        }

        .add-btn:hover {
            transform: scale(1.02);
            filter: brightness(1.1);
        }

        /* --- TABLE --- */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th {
            text-align: left;
            color: var(--accent-cyan);
            font-size: 12px;
            text-transform: uppercase;
            padding: 15px;
            border-bottom: 1px solid var(--border-color);
        }

        td {
            padding: 18px 15px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 14px;
            font-weight: 600;
        }

        .delete-btn {
            background: transparent;
            border: 1px solid #ff0055;
            color: #ff0055;
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.2s;
        }

        .delete-btn:hover {
            background: #ff0055;
            color: white;
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo">BPIT <span>DB</span></div>
        <button class="theme-btn">Toggle Theme</button>
        
        <button class="nav-item active" onclick="switchTab('STUDENTS', 'RollNo', event)">Students</button>
        <button class="nav-item" onclick="switchTab('FACULTY', 'FacultyID', event)">Faculty</button>
        <button class="nav-item" onclick="switchTab('COURSES', 'CourseNo', event)">Courses</button>
        <button class="nav-item" onclick="switchTab('DEPARTMENTS', 'DeptID', event)">Departments</button>
        <button class="nav-item" onclick="switchTab('COLLEGES', 'CollegeID', event)">Colleges</button>
    </aside>

    <main class="main-content">
        <section class="section-card">
            <h1 id="viewTitle">STUDENTS</h1>
            <form id="dataForm" class="form-grid"></form>
        </section>

        <section class="section-card" style="padding: 10px;">
            <div style="overflow-x: auto;">
                <table>
                    <thead id="thead"></thead>
                    <tbody id="tbody"></tbody>
                </table>
            </div>
        </section>
    </main>

    <script>
        let activeTab = "STUDENTS";
        let activePK = "RollNo";
        const BASE_URL = "https://bpit-university-dbms.onrender.com/api";

        const schema = {
            STUDENTS: ["RollNo", "Name", "Year", "Address", "Contact_No"],
            FACULTY: ["FacultyID", "Name", "Designation", "Qualification", "DeptID"],
            COURSES: ["CourseNo", "Course_Title", "Year", "DeptID"],
            DEPARTMENTS: ["DeptID", "Dept_Name", "HOD_Name", "CollegeID"],
            COLLEGES: ["CollegeID", "Name", "Address", "Contact_No"],
        };

        async function loadData() {
            const tb = document.getElementById("tbody");
            const th = document.getElementById("thead");
            tb.innerHTML = "<tr><td colspan='100%' style='text-align:center; opacity:0.5'>Loading data...</td></tr>";
            
            try {
                const res = await fetch(`${BASE_URL}/${activeTab}`);
                const data = await res.json();
                
                if (data && data.length > 0) {
                    const cols = Object.keys(data[0]);
                    th.innerHTML = `<tr>${cols.map(c => `<th>${c}</th>`).join("")}<th></th></tr>`;
                    tb.innerHTML = data.map(row => `
                        <tr>
                            ${cols.map(c => `<td>${row[c] || "—"}</td>`).join("")}
                            <td style="text-align:right">
                                <button class="delete-btn" onclick="del('${row[activePK]}')">DELETE</button>
                            </td>
                        </tr>`).join("");
                } else {
                    tb.innerHTML = "<tr><td colspan='100%' style='text-align:center'>No records found.</td></tr>";
                }
            } catch (e) {
                tb.innerHTML = "<tr><td colspan='100%' style='text-align:center; color:#ff0055'>Sync Error.</td></tr>";
            }
        }

        function renderUI() {
            const form = document.getElementById("dataForm");
            form.innerHTML = schema[activeTab].map(f => 
                `<input id="${f}" placeholder="${f}" required>`
            ).join("") + `<button type="submit" class="add-btn">Add Record</button>`;
            loadData();
        }

        document.getElementById("dataForm").onsubmit = async (e) => {
            e.preventDefault();
            const body = {};
            schema[activeTab].forEach(f => body[f] = document.getElementById(f).value);
            
            await fetch(`${BASE_URL}/${activeTab}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(body)
            });
            e.target.reset();
            loadData();
        };

        async function del(id) {
            if(confirm(`Delete record ${id}?`)) {
                await fetch(`${BASE_URL}/${activeTab}/${activePK}/${id}`, { method: "DELETE" });
                loadData();
            }
        }

        function switchTab(tab, pk, event) {
            activeTab = tab;
            activePK = pk;
            document.querySelectorAll(".nav-item").forEach(b => b.classList.remove("active"));
            event.currentTarget.classList.add("active");
            document.getElementById("viewTitle").innerText = tab;
            renderUI();
        }

        window.onload = renderUI;
    </script>
</body>
</html>
