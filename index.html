<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BPIT Admin Elite | Pro Edition</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap");

      :root {
        /* Premium Dark Mode - Deep Navy & Cyber Blue */
        --bg: radial-gradient(circle at 50% 0%, #1e293b 0%, #0f172a 100%);
        --sidebar: #0f172a;
        --card: rgba(30, 41, 59, 0.7);
        --accent-start: #38bdf8;
        --accent-end: #818cf8;
        --accent: linear-gradient(135deg, var(--accent-start), var(--accent-end));
        --text-primary: #f8fafc;
        --text-secondary: #94a3b8;
        --border: rgba(255, 255, 255, 0.08);
        --input-bg: rgba(15, 23, 42, 0.6);
      }

      [data-theme="light"] {
        /* High-End Light Mode - Indigo & Sky */
        --bg: #f1f5f9;
        --sidebar: #ffffff;
        --card: #ffffff;
        --accent-start: #6366f1;
        --accent-end: #0ea5e9;
        --accent: linear-gradient(135deg, var(--accent-start), var(--accent-end));
        --text-primary: #1e293b; /* Deep Slate - Never pure black */
        --text-secondary: #64748b;
        --border: #e2e8f0;
        --input-bg: #f8fafc;
      }

      /* --- ADVANCED KEYFRAMES --- */
      @keyframes reveal {
        0% { opacity: 0; transform: translateY(20px) scale(0.98); filter: blur(10px); }
        100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
      }

      @keyframes slideIn {
        from { opacity: 0; transform: translateX(-15px); }
        to { opacity: 1; transform: translateX(0); }
      }

      @keyframes float {
        0%, 100% { transform: translateY(0) rotate(0deg); }
        50% { transform: translateY(-10px) rotate(1deg); }
      }

      body {
        font-family: "Plus Jakarta Sans", sans-serif;
        background: var(--bg);
        color: var(--text-primary);
        margin: 0;
        display: flex;
        min-height: 100vh;
        transition: background 0.5s ease, color 0.5s ease;
        overflow-x: hidden;
      }

      /* --- SIDEBAR & NAVIGATION --- */
      .sidebar {
        width: 280px;
        background: var(--sidebar);
        height: 100vh;
        position: fixed;
        padding: 40px 24px;
        border-right: 1px solid var(--border);
        z-index: 1000;
        box-shadow: 20px 0 50px rgba(0,0,0,0.1);
      }

      .logo-container {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 50px;
        animation: float 5s ease-in-out infinite;
      }

      .logo-text {
        background: var(--accent);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        font-weight: 800;
        font-size: 28px;
        letter-spacing: -1px;
      }

      .nav-btn {
        width: 100%;
        padding: 16px 20px;
        margin-bottom: 10px;
        background: transparent;
        border: none;
        color: var(--text-secondary);
        font-weight: 700;
        border-radius: 16px;
        cursor: pointer;
        text-align: left;
        transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .nav-btn.active {
        background: var(--accent);
        color: white;
        box-shadow: 0 10px 25px -5px rgba(99, 102, 241, 0.4);
        transform: scale(1.02);
      }

      .nav-btn:hover:not(.active) {
        background: rgba(99, 102, 241, 0.1);
        color: var(--accent-start);
        padding-left: 28px;
      }

      /* --- MAIN CONTENT --- */
      .main {
        margin-left: 320px;
        padding: 50px;
        width: calc(100% - 320px);
      }

      h1 {
        font-weight: 800;
        font-size: 36px;
        letter-spacing: -1.5px;
        margin-bottom: 30px;
        background: linear-gradient(to bottom right, var(--text-primary), var(--text-secondary));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .card {
        background: var(--card);
        backdrop-filter: blur(20px);
        padding: 40px;
        border-radius: 32px;
        border: 1px solid var(--border);
        margin-bottom: 40px;
        box-shadow: 0 25px 50px -12px rgba(0,0,0,0.15);
        animation: reveal 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
      }

      /* --- FORMS & INPUTS --- */
      #dataForm {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
      }

      input {
        background: var(--input-bg);
        border: 2px solid var(--border);
        color: var(--text-primary);
        padding: 16px 20px;
        border-radius: 16px;
        font-family: inherit;
        font-weight: 600;
        font-size: 15px;
        transition: 0.3s;
      }

      input:focus {
        border-color: var(--accent-start);
        outline: none;
        box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.15);
        background: transparent;
      }

      .btn-add {
        background: var(--accent);
        color: white;
        font-weight: 800;
        border: none;
        border-radius: 16px;
        padding: 16px;
        cursor: pointer;
        transition: 0.3s;
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      .btn-add:hover {
        transform: translateY(-3px) scale(1.02);
        box-shadow: 0 15px 30px rgba(99, 102, 241, 0.3);
      }

      /* --- TABLE DESIGN --- */
      .table-wrapper {
        border-radius: 20px;
        overflow: hidden;
      }

      table { width: 100%; border-collapse: collapse; }
      th { 
        text-align: left; 
        color: var(--text-secondary); 
        font-size: 12px; 
        text-transform: uppercase; 
        letter-spacing: 2px; 
        padding: 20px; 
        border-bottom: 1px solid var(--border); 
        background: rgba(0,0,0,0.02);
      }
      td { 
        padding: 20px; 
        border-bottom: 1px solid var(--border); 
        font-size: 15px; 
        font-weight: 600;
      }
      
      tr:hover td {
        background: rgba(99, 102, 241, 0.03);
      }

      .delete-btn {
        color: #f43f5e;
        border: 2px solid transparent;
        background: rgba(244, 63, 94, 0.1);
        padding: 8px 16px;
        border-radius: 10px;
        font-weight: 700;
        cursor: pointer;
        transition: 0.2s;
      }

      .delete-btn:hover {
        background: #f43f5e;
        color: white;
      }

      @media (max-width: 1024px) {
        .sidebar { position: relative; width: 100%; height: auto; padding: 20px; border-right: none; }
        .main { margin-left: 0; width: 100%; padding: 20px; }
        .nav-btn-container { display: flex; overflow-x: auto; gap: 10px; }
        .nav-btn { min-width: 160px; margin-bottom: 0; }
      }
    </style>
  </head>
  <body>
    <nav class="sidebar">
      <div class="logo-container">
        <div class="logo-text">BPIT Admin</div>
      </div>
      
      <button id="theme-toggle" class="nav-btn" style="justify-content: center; border: 2px solid var(--border); margin-bottom: 30px;">
        🌙 Toggle Theme
      </button>

      <div class="nav-btn-container">
        <button class="nav-btn active" onclick="switchTab('STUDENTS', 'RollNo', event)">Students</button>
        <button class="nav-btn" onclick="switchTab('FACULTY', 'FacultyID', event)">Faculty</button>
        <button class="nav-btn" onclick="switchTab('COURSES', 'CourseNo', event)">Courses</button>
        <button class="nav-btn" onclick="switchTab('DEPARTMENTS', 'DeptID', event)">Departments</button>
        <button class="nav-btn" onclick="switchTab('COLLEGES', 'CollegeID', event)">Colleges</button>
      </div>
    </nav>

    <main class="main">
      <div class="card">
        <h1 id="viewTitle">STUDENTS Management</h1>
        <form id="dataForm"></form>
      </div>

      <div class="card">
        <div class="table-wrapper">
          <table id="dataTable">
            <thead id="thead"></thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
      </div>
    </main>

    <script>
      let activeTab = "STUDENTS";
      let activePK = "RollNo";
      const BASE_URL = "https://bpit-university-dbms.onrender.com/api";

      // --- Theme Engine ---
      const themeToggle = document.getElementById('theme-toggle');
      const setInitialTheme = () => {
        const saved = localStorage.getItem('bpit-pro-theme') || 'dark';
        document.documentElement.setAttribute('data-theme', saved);
        themeToggle.innerText = saved === 'light' ? '☀️ Light Mode' : '🌙 Dark Mode';
      };

      themeToggle.onclick = () => {
        const isLight = document.documentElement.getAttribute('data-theme') === 'light';
        const newTheme = isLight ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', newTheme);
        themeToggle.innerText = newTheme === 'light' ? '☀️ Light Mode' : '🌙 Dark Mode';
        localStorage.setItem('bpit-pro-theme', newTheme);
      };

      const schema = {
        STUDENTS: ["RollNo", "Name", "Year", "Address", "Contact_No"],
        FACULTY: ["FacultyID", "Name", "Designation", "Qualification", "DeptID"],
        COURSES: ["CourseNo", "Course_Title", "Year", "DeptID"],
        DEPARTMENTS: ["DeptID", "Dept_Name", "HOD_Name", "CollegeID"],
        COLLEGES: ["CollegeID", "Name", "Address", "Contact_No"],
      };

      async function loadData() {
        const tb = document.getElementById("tbody");
        const th = document.getElementById("thead");
        tb.innerHTML = "<tr><td colspan='100%' style='text-align:center; padding: 50px; opacity: 0.5;'>Syncing with Neon Cloud...</td></tr>";
        
        try {
          const res = await fetch(`${BASE_URL}/${activeTab}`);
          const data = await res.json();
          
          if (data && data.length > 0) {
            const cols = Object.keys(data[0]);
            th.innerHTML = `<tr>${cols.map(c => `<th>${c}</th>`).join("")}<th>Actions</th></tr>`;
            tb.innerHTML = data.map(row => `
              <tr style="animation: slideIn 0.3s ease forwards">
                ${cols.map(c => `<td>${row[c] || "—"}</td>`).join("")}
                <td><button class="delete-btn" onclick="del('${row[activePK]}')">Remove</button></td>
              </tr>`).join("");
          } else {
            tb.innerHTML = "<tr><td colspan='100%' style='text-align:center; padding: 40px;'>No records found in this table.</td></tr>";
          }
        } catch (e) {
          tb.innerHTML = "<tr><td colspan='100%' style='text-align:center; color:#f43f5e; padding: 40px;'>Database Connection Failed. Check server.</td></tr>";
        }
      }

      function renderUI() {
        const form = document.getElementById("dataForm");
        form.innerHTML = schema[activeTab].map((f, i) => 
          `<input id="${f}" placeholder="Enter ${f}" required style="animation-delay: ${i*0.05}s">`
        ).join("") + `<button type="submit" class="btn-add">Add Record</button>`;
        loadData();
      }

      document.getElementById("dataForm").onsubmit = async (e) => {
        e.preventDefault();
        const btn = e.target.querySelector('.btn-add');
        btn.innerText = "Processing...";
        btn.disabled = true;

        const body = {};
        schema[activeTab].forEach(f => body[f] = document.getElementById(f).value);
        
        try {
          await fetch(`${BASE_URL}/${activeTab}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body)
          });
          e.target.reset();
          loadData();
        } catch (err) { alert("Failed to add entry."); }
        finally { btn.innerText = "Add Record"; btn.disabled = false; }
      };

      async function del(id) {
        if(confirm(`Are you sure you want to delete ${id}?`)) {
          await fetch(`${BASE_URL}/${activeTab}/${activePK}/${id}`, { method: "DELETE" });
          loadData();
        }
      }

      function switchTab(tab, pk, event) {
        activeTab = tab; activePK = pk;
        document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
        event.currentTarget.classList.add("active");
        document.getElementById("viewTitle").innerText = tab + " Management";
        renderUI();
      }

      window.onload = () => {
        setInitialTheme();
        renderUI();
      };
    </script>
  </body>
</html>
