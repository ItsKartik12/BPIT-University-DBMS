<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BPIT Database Management</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

        /* --- THEMES --- */
        :root {
            --bg-deep: #050a14;
            --sidebar-bg: #0a1120;
            --card-bg: #0d1629;
            --accent-cyan: #00f2ff;
            --accent-purple: #7000ff;
            --gradient-main: linear-gradient(90deg, #00f2ff, #7000ff);
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --border-color: #1e293b;
            --input-bg: #050a14;
        }

        body.light-theme {
            --bg-deep: #f0f2f5;
            --sidebar-bg: #ffffff;
            --card-bg: #ffffff;
            --accent-cyan: #0080ff;
            --accent-purple: #6200ea;
            --gradient-main: linear-gradient(90deg, #0080ff, #6200ea);
            --text-main: #1a202c;
            --text-dim: #4a5568;
            --border-color: #e2e8f0;
            --input-bg: #f7fafc;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-main);
            margin: 0;
            display: flex;
            min-height: 100vh;
            transition: background-color 0.3s, color 0.3s;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 240px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            transition: 0.3s;
        }

        .logo { font-size: 22px; font-weight: 800; color: #4facfe; margin-bottom: 40px; }
        .logo span { color: #7000ff; }

        .theme-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-dim);
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 30px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }
        .theme-btn:hover { border-color: var(--accent-cyan); color: var(--text-main); }

        .nav-item {
            padding: 12px 16px;
            border-radius: 8px;
            color: var(--text-dim);
            font-weight: 600;
            margin-bottom: 10px;
            cursor: pointer;
            border: none;
            background: none;
            text-align: left;
            width: 100%;
            transition: 0.3s;
        }

        .nav-item.active {
            background: var(--gradient-main);
            color: white;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.3);
        }

        /* --- MAIN CONTENT --- */
        .main-content {
            flex: 1;
            margin-left: 240px;
            padding: 40px;
        }

        .section-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
            transition: 0.3s;
        }

        /* --- SEARCH BAR --- */
        .search-wrapper {
            margin-bottom: 25px;
        }

        .search-input {
            width: 100%;
            max-width: 450px;
            background: var(--input-bg);
            border: 1px solid var(--accent-cyan);
            color: var(--text-main);
            padding: 12px 18px;
            border-radius: 10px;
            outline: none;
            font-size: 14px;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.05);
            transition: 0.3s;
        }
        .search-input:focus { box-shadow: 0 0 20px rgba(0, 242, 255, 0.15); }

        h1 { font-size: 32px; font-weight: 700; margin-top: 0; text-transform: uppercase; }
        h1::after {
            content: ''; display: block; width: 50px; height: 4px;
            background: var(--accent-cyan); margin-top: 8px; border-radius: 2px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 25px;
        }

        input {
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 14px;
            border-radius: 8px;
            outline: none;
        }

        .add-btn {
            background: var(--gradient-main);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
        }

        /* --- TABLE --- */
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; color: var(--accent-cyan); font-size: 12px; text-transform: uppercase; padding: 15px; border-bottom: 1px solid var(--border-color); }
        td { padding: 18px 15px; border-bottom: 1px solid var(--border-color); font-size: 14px; font-weight: 600; }

        .delete-btn {
            background: transparent; border: 1px solid #ff0055; color: #ff0055;
            padding: 5px 12px; border-radius: 6px; font-size: 11px; font-weight: 800; cursor: pointer;
            transition: 0.2s;
        }
        .delete-btn:hover { background: #ff0055; color: white; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo">BPIT <span>DB</span></div>
        <button class="theme-btn" onclick="toggleTheme()" id="themeToggleBtn">Toggle Light Mode</button>
        
        <button class="nav-item active" onclick="switchTab('STUDENTS', 'RollNo', event)">Students</button>
        <button class="nav-item" onclick="switchTab('FACULTY', 'FacultyID', event)">Faculty</button>
        <button class="nav-item" onclick="switchTab('COURSES', 'CourseNo', event)">Courses</button>
        <button class="nav-item" onclick="switchTab('DEPARTMENTS', 'DeptID', event)">Departments</button>
        <button class="nav-item" onclick="switchTab('COLLEGES', 'CollegeID', event)">Colleges</button>
    </aside>

    <main class="main-content">
        <section class="section-card">
            <h1 id="viewTitle">STUDENTS</h1>
            
            <div class="search-wrapper">
                <input type="text" id="searchInput" class="search-input" placeholder="Quick Search by ID or Name..." onkeyup="filterData()">
            </div>

            <form id="dataForm" class="form-grid"></form>
        </section>

        <section class="section-card" style="padding: 10px;">
            <div style="overflow-x: auto;">
                <table>
                    <thead id="thead"></thead>
                    <tbody id="tbody"></tbody>
                </table>
            </div>
        </section>
    </main>

    <script>
        let allData = []; // Local cache for instant searching
        let activeTab = "STUDENTS";
        let activePK = "RollNo";
        const BASE_URL = "https://bpit-university-dbms.onrender.com/api";

        function toggleTheme() {
            const body = document.body;
            const btn = document.getElementById('themeToggleBtn');
            body.classList.toggle('light-theme');
            btn.innerText = body.classList.contains('light-theme') ? "Toggle Dark Mode" : "Toggle Light Mode";
        }

        const schema = {
            STUDENTS: ["RollNo", "Name", "Year", "Address", "Contact_No"],
            FACULTY: ["FacultyID", "Name", "Designation", "Qualification", "DeptID"],
            COURSES: ["CourseNo", "Course_Title", "Year", "DeptID"],
            DEPARTMENTS: ["DeptID", "Dept_Name", "HOD_Name", "CollegeID"],
            COLLEGES: ["CollegeID", "Name", "Address", "Contact_No"],
        };

        // FETCH DATA
        async function loadData() {
            const tb = document.getElementById("tbody");
            const th = document.getElementById("thead");
            tb.innerHTML = "<tr><td colspan='100%' style='text-align:center; opacity:0.5'>Syncing with server...</td></tr>";
            
            try {
                const res = await fetch(`${BASE_URL}/${activeTab}`);
                allData = await res.json();
                renderTable(allData);
            } catch (e) {
                tb.innerHTML = "<tr><td colspan='100%' style='text-align:center; color:#ff0055'>Sync Error. Check API.</td></tr>";
            }
        }

        // RENDER TABLE DATA
        function renderTable(dataToDisplay) {
            const tb = document.getElementById("tbody");
            const th = document.getElementById("thead");
            
            if (dataToDisplay && dataToDisplay.length > 0) {
                const cols = Object.keys(dataToDisplay[0]);
                th.innerHTML = `<tr>${cols.map(c => `<th>${c}</th>`).join("")}<th></th></tr>`;
                tb.innerHTML = dataToDisplay.map(row => `
                    <tr>
                        ${cols.map(c => `<td>${row[c] || "—"}</td>`).join("")}
                        <td style="text-align:right">
                            <button class="delete-btn" onclick="del('${row[activePK]}')">DELETE</button>
                        </td>
                    </tr>`).join("");
            } else {
                tb.innerHTML = "<tr><td colspan='100%' style='text-align:center'>No results found.</td></tr>";
            }
        }

        // SEARCH FUNCTION (ID or Name)
        function filterData() {
            const query = document.getElementById("searchInput").value.toLowerCase();
            
            const filtered = allData.filter(item => {
                const nameField = (item.Name || item.Course_Title || item.Dept_Name || "").toLowerCase();
                const idField = String(item[activePK]).toLowerCase();
                return nameField.includes(query) || idField.includes(query);
            });

            renderTable(filtered);
        }

        function renderUI() {
            const form = document.getElementById("dataForm");
            form.innerHTML = schema[activeTab].map(f => 
                `<input id="${f}" placeholder="${f}" required>`
            ).join("") + `<button type="submit" class="add-btn">Add Record</button>`;
            document.getElementById("searchInput").value = ""; 
            loadData();
        }

        document.getElementById("dataForm").onsubmit = async (e) => {
            e.preventDefault();
            const body = {};
            schema[activeTab].forEach(f => body[f] = document.getElementById(f).value);
            await fetch(`${BASE_URL}/${activeTab}`, { 
                method: "POST", 
                headers: { "Content-Type": "application/json" }, 
                body: JSON.stringify(body) 
            });
            e.target.reset(); 
            loadData();
        };

        async function del(id) {
            if(confirm(`Remove record ${id}?`)) {
                await fetch(`${BASE_URL}/${activeTab}/${activePK}/${id}`, { method: "DELETE" });
                loadData();
            }
        }

        function switchTab(tab, pk, event) {
            activeTab = tab; activePK = pk;
            document.querySelectorAll(".nav-item").forEach(b => b.classList.remove("active"));
            event.currentTarget.classList.add("active");
            document.getElementById("viewTitle").innerText = tab;
            renderUI();
        }

        window.onload = renderUI;
    </script>
</body>
</html>
