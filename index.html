<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BPIT Admin Pro | Animated</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap");

      :root {
        --bg: radial-gradient(circle at 50% -20%, #1a2333 0%, #0b0f1a 70%);
        --sidebar: #111827;
        --card: rgba(31, 41, 55, 0.4);
        --accent-start: #60a5fa;
        --accent-end: #a78bfa;
        --accent: linear-gradient(135deg, var(--accent-start), var(--accent-end));
        --text-primary: #f8fafc;
        --text-secondary: #94a3b8;
        --border: rgba(255, 255, 255, 0.05);
        --glass: blur(15px) saturate(180%);
      }

      /* --- NEW KEYFRAMES --- */
      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }

      @keyframes slideInLeft {
        from { transform: translateX(-100%); }
        to { transform: translateX(0); }
      }

      @keyframes pulseGlow {
        0% { box-shadow: 0 0 5px rgba(96, 165, 250, 0.2); }
        50% { box-shadow: 0 0 20px rgba(96, 165, 250, 0.5); }
        100% { box-shadow: 0 0 5px rgba(96, 165, 250, 0.2); }
      }

      body {
        font-family: "Plus Jakarta Sans", sans-serif;
        background: var(--bg);
        color: var(--text-primary);
        margin: 0;
        display: flex;
        min-height: 100vh;
        overflow-x: hidden;
      }

      .sidebar {
        width: 260px;
        background: var(--sidebar);
        height: 100vh;
        position: fixed;
        padding: 40px 20px;
        border-right: 1px solid var(--border);
        animation: slideInLeft 0.8s cubic-bezier(0.25, 1, 0.5, 1);
        z-index: 1000;
      }

      .main {
        margin-left: 300px;
        padding: 40px;
        width: calc(100% - 300px);
      }

      /* Animating the cards one by one */
      .card {
        background: var(--card);
        backdrop-filter: var(--glass);
        padding: 30px;
        border-radius: 28px;
        border: 1px solid var(--border);
        margin-bottom: 30px;
        animation: fadeInUp 0.8s ease-out forwards;
        opacity: 0; /* Starts hidden for animation */
      }

      .card:nth-child(1) { animation-delay: 0.2s; }
      .card:nth-child(2) { animation-delay: 0.4s; }

      .logo-text {
        background: var(--accent);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        font-weight: 800;
        font-size: 24px;
        margin-bottom: 30px;
      }

      .nav-btn {
        width: 100%;
        padding: 14px 18px;
        margin-bottom: 10px;
        background: transparent;
        border: 1px solid transparent;
        color: var(--text-secondary);
        font-weight: 600;
        border-radius: 14px;
        cursor: pointer;
        transition: all 0.3s ease;
        text-align: left;
      }

      .nav-btn.active {
        background: var(--accent);
        color: white;
        animation: pulseGlow 3s infinite;
      }

      .nav-btn:hover:not(.active) {
        background: rgba(255, 255, 255, 0.05);
        transform: translateX(5px);
      }

      input {
        background: rgba(0,0,0,0.2);
        border: 1px solid var(--border);
        color: white;
        padding: 14px;
        border-radius: 12px;
        transition: 0.3s;
      }

      input:focus {
        border-color: var(--accent-start);
        background: rgba(0,0,0,0.4);
        outline: none;
      }

      .btn-add {
        background: var(--accent);
        border: none;
        color: white;
        font-weight: 800;
        border-radius: 12px;
        cursor: pointer;
        transition: transform 0.2s;
      }

      .btn-add:hover {
        transform: scale(1.03);
      }

      .table-container { overflow-x: auto; }
      table { width: 100%; border-collapse: collapse; min-width: 600px; }
      th { color: var(--text-secondary); font-size: 0.8rem; text-transform: uppercase; padding: 15px; border-bottom: 1px solid var(--border); }
      td { padding: 15px; border-bottom: 1px solid var(--border); }

      /* Mobile Adjustment */
      @media (max-width: 992px) {
        body { flex-direction: column; }
        .sidebar { position: relative; width: 100%; height: auto; padding: 20px; border-right: none; }
        .main { margin-left: 0; width: 100%; box-sizing: border-box; }
        .nav-btn-container { display: flex; overflow-x: auto; gap: 10px; }
        .nav-btn { min-width: 120px; }
      }
    </style>
  </head>
  <body>
    <nav class="sidebar">
      <div class="logo-text">BPIT Admin</div>
      <button id="theme-toggle" class="nav-btn" style="text-align:center; border: 1px solid var(--border);">🌙 Mode</button>
      <div class="nav-btn-container">
        <button class="nav-btn active" onclick="switchTab('STUDENTS', 'RollNo', event)">Students</button>
        <button class="nav-btn" onclick="switchTab('FACULTY', 'FacultyID', event)">Faculty</button>
        <button class="nav-btn" onclick="switchTab('COURSES', 'CourseNo', event)">Courses</button>
        <button class="nav-btn" onclick="switchTab('DEPARTMENTS', 'DeptID', event)">Departments</button>
        <button class="nav-btn" onclick="switchTab('COLLEGES', 'CollegeID', event)">Colleges</button>
      </div>
    </nav>

    <main class="main">
      <div class="card">
        <h1 id="viewTitle" style="margin: 0 0 20px 0;">STUDENTS Management</h1>
        <form id="dataForm" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px;"></form>
      </div>

      <div class="card">
        <div class="table-container">
          <table>
            <thead id="thead"></thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
      </div>
    </main>

    <script>
      let activeTab = "STUDENTS";
      let activePK = "RollNo";
      const BASE_URL = "https://bpit-university-dbms.onrender.com/api";

      const schema = {
        STUDENTS: ["RollNo", "Name", "Year", "Address", "Contact_No"],
        FACULTY: ["FacultyID", "Name", "Designation", "Qualification", "DeptID"],
        COURSES: ["CourseNo", "Course_Title", "Year", "DeptID"],
        DEPARTMENTS: ["DeptID", "Dept_Name", "HOD_Name", "CollegeID"],
        COLLEGES: ["CollegeID", "Name", "Address", "Contact_No"],
      };

      function renderUI() {
        const form = document.getElementById("dataForm");
        form.innerHTML = schema[activeTab].map(f => `<input id="${f}" placeholder="${f}" required>`).join("") 
                        + `<button type="submit" class="btn-add">Add Entry</button>`;
        loadData();
      }

      async function loadData() {
        const tb = document.getElementById("tbody");
        const th = document.getElementById("thead");
        tb.innerHTML = "<tr><td colspan='100%'>Loading Data...</td></tr>";
        try {
          const res = await fetch(`${BASE_URL}/${activeTab}`);
          const data = await res.json();
          if (data && data.length > 0) {
            const cols = Object.keys(data[0]);
            th.innerHTML = `<tr>${cols.map(c => `<th>${c}</th>`).join("")}<th>Action</th></tr>`;
            tb.innerHTML = data.map(row => `<tr>${cols.map(c => `<td>${row[c] || ""}</td>`).join("")}
              <td><button style="color:#ff4d4d; border:none; background:none; cursor:pointer;" onclick="del('${row[activePK]}')">Delete</button></td></tr>`).join("");
          } else { tb.innerHTML = "<tr><td colspan='100%'>Empty Table</td></tr>"; }
        } catch (e) { tb.innerHTML = "<tr><td>Connection Error</td></tr>"; }
      }

      document.getElementById("dataForm").onsubmit = async (e) => {
        e.preventDefault();
        const body = {};
        schema[activeTab].forEach(f => body[f] = document.getElementById(f).value);
        await fetch(`${BASE_URL}/${activeTab}`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) });
        e.target.reset(); loadData();
      };

      async function del(id) {
        if(confirm("Delete?")) {
          await fetch(`${BASE_URL}/${activeTab}/${activePK}/${id}`, { method: "DELETE" });
          loadData();
        }
      }

      function switchTab(tab, pk, event) {
        activeTab = tab; activePK = pk;
        document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
        event.currentTarget.classList.add("active");
        document.getElementById("viewTitle").innerText = tab + " Management";
        renderUI();
      }

      window.onload = renderUI;
    </script>
  </body>
</html>
