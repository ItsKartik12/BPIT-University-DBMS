<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BPIT Admin Elite | 2026</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap");

      :root {
        --bg: radial-gradient(circle at 50% -20%, #1a2333 0%, #0b0f1a 70%);
        --sidebar: #0f172a;
        --card: rgba(30, 41, 59, 0.5);
        --accent-start: #38bdf8;
        --accent-end: #818cf8;
        --accent: linear-gradient(135deg, var(--accent-start), var(--accent-end));
        --text-primary: #f1f5f9;
        --text-secondary: #94a3b8;
        --border: rgba(255, 255, 255, 0.06);
        --glass: blur(16px) saturate(180%);
      }

      [data-theme="light"] {
        --bg: #f8fafc;
        --sidebar: #ffffff;
        --card: #ffffff;
        --accent-start: #4f46e5;
        --accent-end: #0ea5e9;
        --accent: linear-gradient(135deg, var(--accent-start), var(--accent-end));
        --text-primary: #1e293b;
        --text-secondary: #64748b;
        --border: #e2e8f0;
      }

      @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }

      body { font-family: "Plus Jakarta Sans", sans-serif; background: var(--bg); color: var(--text-primary); margin: 0; display: flex; min-height: 100vh; transition: 0.4s; }
      .sidebar { width: 260px; background: var(--sidebar); height: 100vh; position: fixed; padding: 40px 20px; border-right: 1px solid var(--border); z-index: 1000; }
      .logo-text { background: var(--accent); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; font-size: 26px; margin-bottom: 40px; display: inline-block; }
      .main { margin-left: 300px; padding: 40px; width: calc(100% - 300px); }
      .card { background: var(--card); backdrop-filter: var(--glass); padding: 30px; border-radius: 24px; border: 1px solid var(--border); margin-bottom: 30px; animation: fadeInUp 0.6s ease-out forwards; }
      .nav-btn { width: 100%; padding: 15px; margin-bottom: 10px; background: transparent; border: none; color: var(--text-secondary); font-weight: 700; border-radius: 12px; cursor: pointer; text-align: left; transition: 0.3s; }
      .nav-btn.active { background: var(--accent); color: white; box-shadow: 0 10px 20px -5px rgba(79, 70, 229, 0.3); }
      input { background: rgba(0, 0, 0, 0.05); border: 2px solid var(--border); color: var(--text-primary); padding: 12px; border-radius: 10px; font-family: inherit; font-weight: 600; animation: slideIn 0.4s ease forwards; }
      .btn-add { background: var(--accent); color: white; font-weight: 800; border: none; border-radius: 10px; padding: 12px; cursor: pointer; }
      table { width: 100%; border-collapse: collapse; }
      th { text-align: left; color: var(--text-secondary); font-size: 11px; text-transform: uppercase; padding: 15px; border-bottom: 2px solid var(--border); }
      td { padding: 15px; border-bottom: 1px solid var(--border); font-size: 14px; }
      
      @media (max-width: 992px) { .sidebar { position: relative; width: 100%; height: auto; padding: 20px; border-right: none; } .main { margin-left: 0; width: 100%; } .nav-btn-container { display: flex; overflow-x: auto; gap: 10px; } }
    </style>
  </head>
  <body>
    <nav class="sidebar">
      <div class="logo-text">BPIT Elite</div>
      <button id="theme-toggle" class="nav-btn" style="text-align:center; border: 1px solid var(--border); margin-bottom: 20px;">🌙 Toggle Theme</button>
      <div class="nav-btn-container">
        <button class="nav-btn active" onclick="switchTab('STUDENTS', 'RollNo', event)">Students</button>
        <button class="nav-btn" onclick="switchTab('FACULTY', 'FacultyID', event)">Faculty</button>
        <button class="nav-btn" onclick="switchTab('COURSES', 'CourseNo', event)">Courses</button>
        <button class="nav-btn" onclick="switchTab('DEPARTMENTS', 'DeptID', event)">Departments</button>
        <button class="nav-btn" onclick="switchTab('COLLEGES', 'CollegeID', event)">Colleges</button>
      </div>
    </nav>

    <main class="main">
      <div class="card">
        <h1 id="viewTitle" style="margin-top:0">STUDENTS Management</h1>
        <form id="dataForm" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px;"></form>
      </div>
      <div class="card">
        <div style="overflow-x: auto;">
          <table><thead id="thead"></thead><tbody id="tbody"></tbody></table>
        </div>
      </div>
    </main>

    <script>
      let activeTab = "STUDENTS";
      let activePK = "RollNo";
      const BASE_URL = "https://bpit-university-dbms.onrender.com/api";

      const themeToggle = document.getElementById('theme-toggle');
      themeToggle.onclick = () => {
        const doc = document.documentElement;
        const isLight = doc.getAttribute('data-theme') === 'light';
        doc.setAttribute('data-theme', isLight ? 'dark' : 'light');
        themeToggle.innerText = isLight ? '🌙 Toggle Theme' : '☀️ Toggle Theme';
      };

      const schema = {
        STUDENTS: ["RollNo", "Name", "Year", "Address", "Contact_No"],
        FACULTY: ["FacultyID", "Name", "Designation", "Qualification", "DeptID"],
        COURSES: ["CourseNo", "Course_Title", "Year", "DeptID"],
        DEPARTMENTS: ["DeptID", "Dept_Name", "HOD_Name", "CollegeID"],
        COLLEGES: ["CollegeID", "Name", "Address", "Contact_No"],
      };

      async function loadData() {
        const tb = document.getElementById("tbody");
        const th = document.getElementById("thead");
        tb.innerHTML = "<tr><td colspan='100%'>Loading Cloud... (Neon may take 10s to wake up)</td></tr>";
        try {
          const res = await fetch(`${BASE_URL}/${activeTab}`);
          const data = await res.json();
          if (data && data.length > 0) {
            const cols = Object.keys(data[0]);
            th.innerHTML = `<tr>${cols.map(c => `<th>${c}</th>`).join("")}<th></th></tr>`;
            tb.innerHTML = data.map(row => `<tr>${cols.map(c => `<td>${row[c] || ""}</td>`).join("")}
              <td><button style="color:#ef4444; border:none; background:none; cursor:pointer; font-weight:800;" onclick="del('${row[activePK]}')">Delete</button></td></tr>`).join("");
          } else { tb.innerHTML = "<tr><td>Empty Table</td></tr>"; }
        } catch (e) { tb.innerHTML = "<tr><td style='color:red'>Server Offline. Refresh in 10 seconds.</td></tr>"; }
      }

      function renderUI() {
        const form = document.getElementById("dataForm");
        form.innerHTML = schema[activeTab].map(f => `<input id="${f}" placeholder="${f}" required>`).join("") 
                        + `<button type="submit" class="btn-add">Add Entry</button>`;
        loadData();
      }

      document.getElementById("dataForm").onsubmit = async (e) => {
        e.preventDefault();
        const body = {};
        schema[activeTab].forEach(f => body[f] = document.getElementById(f).value);
        await fetch(`${BASE_URL}/${activeTab}`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) });
        e.target.reset(); loadData();
      };

      async function del(id) {
        if(confirm("Delete?")) {
          await fetch(`${BASE_URL}/${activeTab}/${activePK}/${id}`, { method: "DELETE" });
          loadData();
        }
      }

      function switchTab(tab, pk, event) {
        activeTab = tab; activePK = pk;
        document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
        event.currentTarget.classList.add("active");
        document.getElementById("viewTitle").innerText = tab + " Management";
        renderUI();
      }

      window.onload = renderUI;
    </script>
  </body>
</html>
