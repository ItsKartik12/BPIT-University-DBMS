<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BPIT Admin | Cyber-Vibrant</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap");

      :root {
        /* DARK: Deep Midnight & Neon */
        --bg: #030712;
        --sidebar: #0f172a;
        --card: rgba(15, 23, 42, 0.8);
        --accent-1: #00f2ff; /* Cyan */
        --accent-2: #7000ff; /* Purple */
        --accent-3: #ff007a; /* Pink */
        --text-primary: #ffffff;
        --text-secondary: #94a3b8;
        --border: rgba(0, 242, 255, 0.2);
        --input-bg: #020617;
      }

      [data-theme="light"] {
        /* LIGHT: Electric Indigo & Sky */
        --bg: #f8fafc;
        --sidebar: #ffffff;
        --card: #ffffff;
        --accent-1: #4f46e5;
        --accent-2: #7c3aed;
        --accent-3: #db2777;
        --text-primary: #0f172a;
        --text-secondary: #475569;
        --border: #e2e8f0;
        --input-bg: #f1f5f9;
      }

      body {
        font-family: "Plus Jakarta Sans", sans-serif;
        background: var(--bg);
        color: var(--text-primary);
        margin: 0;
        display: flex;
        min-height: 100vh;
        transition: 0.3s;
        font-size: 14px; /* Reduced base size */
      }

      /* --- SIDEBAR --- */
      .sidebar {
        width: 240px;
        background: var(--sidebar);
        padding: 40px 20px;
        border-right: 2px solid var(--border);
        height: 100vh;
        position: fixed;
        box-shadow: 10px 0 30px rgba(0,0,0,0.5);
      }

      .logo-text {
        font-size: 24px;
        font-weight: 800;
        background: linear-gradient(90deg, var(--accent-1), var(--accent-2), var(--accent-3));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 40px;
        display: block;
        letter-spacing: -1px;
      }

      .nav-btn {
        width: 100%;
        padding: 12px 16px;
        margin-bottom: 8px;
        background: transparent;
        border: none;
        color: var(--text-secondary);
        font-weight: 700;
        border-radius: 10px;
        cursor: pointer;
        text-align: left;
        transition: 0.2s;
        font-size: 13px;
      }

      .nav-btn.active {
        background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
        color: white;
        box-shadow: 0 4px 15px rgba(0, 242, 255, 0.3);
      }

      .nav-btn:hover:not(.active) {
        background: rgba(0, 242, 255, 0.1);
        color: var(--accent-1);
      }

      /* --- MAIN CONTENT --- */
      .main { margin-left: 280px; padding: 40px; width: calc(100% - 280px); }

      /* VIBRANT TITLE SYSTEM */
      .title-container {
        margin-bottom: 40px;
        position: relative;
      }

      h1 {
        font-size: 32px;
        font-weight: 800;
        margin: 0;
        background: linear-gradient(to right, var(--accent-1), var(--accent-3));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        display: inline-block;
      }

      .title-underline {
        height: 4px;
        width: 60px;
        background: var(--accent-1);
        margin-top: 8px;
        border-radius: 10px;
        box-shadow: 0 0 10px var(--accent-1);
      }

      .card {
        background: var(--card);
        padding: 25px;
        border-radius: 16px;
        border: 1px solid var(--border);
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        margin-bottom: 25px;
        backdrop-filter: blur(10px);
      }

      /* --- INPUTS --- */
      input {
        background: var(--input-bg);
        border: 1px solid var(--border);
        color: var(--text-primary);
        padding: 12px;
        border-radius: 8px;
        font-weight: 600;
        font-size: 13px;
        transition: 0.3s;
      }

      input:focus {
        outline: none;
        border-color: var(--accent-1);
        box-shadow: 0 0 0 3px rgba(0, 242, 255, 0.1);
      }

      .btn-add {
        background: linear-gradient(90deg, var(--accent-1), var(--accent-2));
        color: white;
        font-weight: 800;
        border: none;
        border-radius: 8px;
        padding: 12px;
        cursor: pointer;
        font-size: 13px;
        text-transform: uppercase;
      }

      /* --- TABLE --- */
      table { width: 100%; border-collapse: collapse; }
      th { 
        color: var(--accent-1); 
        font-weight: 800; 
        font-size: 11px;
        text-transform: uppercase; 
        padding: 12px; 
        border-bottom: 2px solid var(--border);
        text-align: left;
      }
      td { 
        padding: 12px; 
        border-bottom: 1px solid var(--border); 
        font-weight: 600; 
        font-size: 13px;
      }

      .delete-btn {
        color: var(--accent-3);
        background: none;
        border: 1px solid var(--accent-3);
        padding: 4px 10px;
        border-radius: 6px;
        font-weight: 800;
        font-size: 10px;
        cursor: pointer;
        transition: 0.2s;
      }

      .delete-btn:hover {
        background: var(--accent-3);
        color: white;
      }
    </style>
  </head>
  <body>
    <nav class="sidebar">
      <span class="logo-text">BPIT DB</span>
      <button id="theme-toggle" class="nav-btn" style="text-align: center; border: 1px solid var(--border); margin-bottom: 30px;">Toggle Theme</button>
      <div class="nav-btn-container">
        <button class="nav-btn active" onclick="switchTab('STUDENTS', 'RollNo', event)">Students</button>
        <button class="nav-btn" onclick="switchTab('FACULTY', 'FacultyID', event)">Faculty</button>
        <button class="nav-btn" onclick="switchTab('COURSES', 'CourseNo', event)">Courses</button>
        <button class="nav-btn" onclick="switchTab('DEPARTMENTS', 'DeptID', event)">Departments</button>
        <button class="nav-btn" onclick="switchTab('COLLEGES', 'CollegeID', event)">Colleges</button>
      </div>
    </nav>

    <main class="main">
      <div class="card">
        <div class="title-container">
          <h1 id="viewTitle">STUDENTS</h1>
          <div class="title-underline"></div>
        </div>
        <form id="dataForm" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px;"></form>
      </div>

      <div class="card">
        <div style="overflow-x: auto;">
          <table>
            <thead id="thead"></thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
      </div>
    </main>

    <script>
      let activeTab = "STUDENTS";
      let activePK = "RollNo";
      const BASE_URL = "https://bpit-university-dbms.onrender.com/api";

      const themeToggle = document.getElementById('theme-toggle');
      themeToggle.onclick = () => {
        const doc = document.documentElement;
        doc.setAttribute('data-theme', doc.getAttribute('data-theme') === 'light' ? 'dark' : 'light');
      };

      const schema = {
        STUDENTS: ["RollNo", "Name", "Year", "Address", "Contact_No"],
        FACULTY: ["FacultyID", "Name", "Designation", "Qualification", "DeptID"],
        COURSES: ["CourseNo", "Course_Title", "Year", "DeptID"],
        DEPARTMENTS: ["DeptID", "Dept_Name", "HOD_Name", "CollegeID"],
        COLLEGES: ["CollegeID", "Name", "Address", "Contact_No"],
      };

      async function loadData() {
        const tb = document.getElementById("tbody");
        const th = document.getElementById("thead");
        tb.innerHTML = "<tr><td colspan='100%'>Loading...</td></tr>";
        try {
          const res = await fetch(`${BASE_URL}/${activeTab}`);
          const data = await res.json();
          if (data && data.length > 0) {
            const cols = Object.keys(data[0]);
            th.innerHTML = `<tr>${cols.map(c => `<th>${c}</th>`).join("")}<th></th></tr>`;
            tb.innerHTML = data.map(row => `<tr>${cols.map(c => `<td>${row[c] || ""}</td>`).join("")}
              <td><button class="delete-btn" onclick="del('${row[activePK]}')">DELETE</button></td></tr>`).join("");
          } else { tb.innerHTML = "<tr><td>Empty Table</td></tr>"; }
        } catch (e) { tb.innerHTML = "<tr><td>Error connecting to API.</td></tr>"; }
      }

      function renderUI() {
        const form = document.getElementById("dataForm");
        form.innerHTML = schema[activeTab].map(f => `<input id="${f}" placeholder="${f}" required>`).join("") 
                        + `<button type="submit" class="btn-add">Add Record</button>`;
        loadData();
      }

      document.getElementById("dataForm").onsubmit = async (e) => {
        e.preventDefault();
        const body = {};
        schema[activeTab].forEach(f => body[f] = document.getElementById(f).value);
        await fetch(`${BASE_URL}/${activeTab}`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) });
        e.target.reset(); loadData();
      };

      async function del(id) {
        if(confirm("Confirm Delete?")) {
          await fetch(`${BASE_URL}/${activeTab}/${activePK}/${id}`, { method: "DELETE" });
          loadData();
        }
      }

      function switchTab(tab, pk, event) {
        activeTab = tab; activePK = pk;
        document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
        event.currentTarget.classList.add("active");
        document.getElementById("viewTitle").innerText = tab;
        renderUI();
      }

      window.onload = renderUI;
    </script>
  </body>
</html>
