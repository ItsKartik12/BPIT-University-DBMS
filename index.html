<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BPIT University Management | Admin Dashboard</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap");

      :root {
        --bg: #0b0f1a;
        --sidebar: #111827;
        --card: rgba(31, 41, 55, 0.7);
        --accent: #60a5fa;
        --text-primary: #f8fafc;
        --text-secondary: #94a3b8;
      }

      body {
        font-family: "Plus Jakarta Sans", sans-serif;
        background-color: var(--bg);
        color: var(--text-primary);
        margin: 0;
        display: flex;
        min-height: 100vh;
      }

      /* Sidebar */
      .sidebar {
        width: 260px;
        background: var(--sidebar);
        height: 100vh;
        position: fixed;
        padding: 40px 20px;
        border-right: 1px solid rgba(255, 255, 255, 0.05);
      }

      .nav-btn {
        display: block;
        width: 100%;
        padding: 15px;
        margin-bottom: 10px;
        background: transparent;
        border: none;
        color: var(--text-secondary);
        font-size: 18px;
        font-weight: 600;
        text-align: left;
        cursor: pointer;
        border-radius: 12px;
        transition: 0.3s;
      }

      .nav-btn:hover,
      .nav-btn.active {
        background: rgba(96, 165, 250, 0.1);
        color: var(--accent);
      }

      /* Main Content */
      .main {
        margin-left: 300px;
        padding: 50px;
        width: calc(100% - 300px);
      }

      .card {
        background: var(--card);
        backdrop-filter: blur(10px);
        padding: 30px;
        border-radius: 24px;
        border: 1px solid rgba(255, 255, 255, 0.05);
        margin-bottom: 30px;
      }

      .form-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 15px;
      }

      input {
        background: rgba(0, 0, 0, 0.2);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: white;
        padding: 12px;
        border-radius: 8px;
        font-size: 16px;
      }

      .btn-add {
        background: var(--accent);
        color: #000;
        font-weight: 800;
        border: none;
        padding: 12px;
        border-radius: 8px;
        cursor: pointer;
        transition: 0.2s;
      }

      .btn-add:hover {
        background: #93c5fd;
      }

      /* Table Styles */
      .table-container {
        overflow-x: auto;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
      }

      th {
        text-align: left;
        color: var(--text-secondary);
        padding: 15px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      td {
        padding: 15px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        font-size: 0.95rem;
      }

      .btn-del {
        color: #f43f5e;
        background: rgba(244, 63, 94, 0.1);
        border: none;
        padding: 6px 12px;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 600;
        transition: 0.2s;
      }

      .btn-del:hover {
        background: rgba(244, 63, 94, 0.2);
      }

      .loading-text {
        color: var(--accent);
        font-style: italic;
      }
    </style>
  </head>
  <body>
    <nav class="sidebar">
      <h2 style="margin-bottom: 40px; color: var(--accent)">BPIT Admin</h2>
      <button
        class="nav-btn active"
        onclick="switchTab('STUDENTS', 'RollNo', event)"
      >
        Students
      </button>
      <button
        class="nav-btn"
        onclick="switchTab('FACULTY', 'FacultyID', event)"
      >
        Faculty
      </button>
      <button class="nav-btn" onclick="switchTab('COURSES', 'CourseNo', event)">
        Courses
      </button>
      <button
        class="nav-btn"
        onclick="switchTab('DEPARTMENTS', 'DeptID', event)"
      >
        Departments
      </button>
      <button
        class="nav-btn"
        onclick="switchTab('COLLEGES', 'CollegeID', event)"
      >
        Colleges
      </button>
    </nav>

    <main class="main">
      <div class="card">
        <h2 id="viewTitle">STUDENTS Management</h2>
        <form id="dataForm" class="form-grid"></form>
      </div>

      <div class="card">
        <div class="table-container">
          <table>
            <thead id="thead"></thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
      </div>
    </main>

    <script>
      let activeTab = "STUDENTS";
      let activePK = "RollNo";

      // LIVE BACKEND URL
      const BASE_URL = "https://bpit-university-dbms.onrender.com/api";

      const schema = {
        STUDENTS: ["RollNo", "Name", "Year", "Address", "Contact_No"],
        FACULTY: [
          "FacultyID",
          "Name",
          "Designation",
          "Qualification",
          "DeptID",
        ],
        COURSES: ["CourseNo", "Course_Title", "Year", "DeptID"],
        DEPARTMENTS: ["DeptID", "Dept_Name", "HOD_Name", "CollegeID"],
        COLLEGES: ["CollegeID", "Name", "Address", "Contact_No"],
      };

      function renderUI() {
        // Render Form Inputs
        const form = document.getElementById("dataForm");
        form.innerHTML =
          schema[activeTab]
            .map((f) => `<input id="${f}" placeholder="${f}" required>`)
            .join("") +
          `<button type="submit" class="btn-add">Add Entry</button>`;

        loadData();
      }

      async function loadData() {
        const tb = document.getElementById("tbody");
        const th = document.getElementById("thead");
        tb.innerHTML =
          "<tr><td colspan='100%' class='loading-text'>Loading data from cloud...</td></tr>";

        try {
          const res = await fetch(`${BASE_URL}/${activeTab}`);
          const data = await res.json();

          if (data && data.length > 0) {
            const cols = Object.keys(data[0]);
            th.innerHTML = `<tr>${cols.map((c) => `<th>${c}</th>`).join("")}<th>Action</th></tr>`;

            tb.innerHTML = data
              .map(
                (row) => `
              <tr>
                ${cols.map((c) => `<td>${row[c] !== null ? row[c] : ""}</td>`).join("")}
                <td><button class="btn-del" onclick="del('${row[activePK]}')">Delete</button></td>
              </tr>
            `,
              )
              .join("");
          } else {
            tb.innerHTML =
              "<tr><td colspan='100%'>No records found in this table.</td></tr>";
          }
        } catch (err) {
          console.error("Fetch error:", err);
          tb.innerHTML =
            "<tr><td colspan='100%' style='color: #f43f5e'>Error connecting to server. Make sure Render is awake.</td></tr>";
        }
      }

      document.getElementById("dataForm").onsubmit = async (e) => {
        e.preventDefault();
        const body = {};
        schema[activeTab].forEach((f) => {
          body[f] = document.getElementById(f).value;
        });

        try {
          const response = await fetch(`${BASE_URL}/${activeTab}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body),
          });

          if (response.ok) {
            e.target.reset();
            loadData();
          } else {
            alert("Error adding entry. Check console for details.");
          }
        } catch (error) {
          console.error("Post error:", error);
        }
      };

      async function del(id) {
        if (confirm(`Delete record with ID: ${id}?`)) {
          try {
            await fetch(`${BASE_URL}/${activeTab}/${activePK}/${id}`, {
              method: "DELETE",
            });
            loadData();
          } catch (error) {
            console.error("Delete error:", error);
          }
        }
      }

      function switchTab(tab, pk, event) {
        activeTab = tab;
        activePK = pk;

        // Update Sidebar Active State
        document
          .querySelectorAll(".nav-btn")
          .forEach((b) => b.classList.remove("active"));
        event.currentTarget.classList.add("active");

        document.getElementById("viewTitle").innerText = tab + " Management";
        renderUI();
      }

      window.onload = renderUI;
    </script>
  </body>
</html>
